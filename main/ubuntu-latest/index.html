 module and library.\n\nThis is the single source of truth for your module. It is embedded into the plugin binary by Qt's `Q_PLUGIN_METADATA` macro (for runtime metadata), read by `logos-module-builder` to configure the Nix build, used by CMake to resolve external dependencies and link libraries (via the `nix` section), and used by `nix-bundle-lgx` to generate the LGX manifest.\n\n```json\n{\n  \"name\": \"calc_module\",\n  \"version\": \"1.0.0\",\n  \"type\": \"core\",\n  \"category\": \"general\",\n  \"description\": \"Calculator module wrapping libcalc C library\",\n  \"main\": \"calc_module_plugin\",\n  \"dependencies\": [],\n\n  \"nix\": {\n    \"packages\": {\n      \"build\": [],\n      \"runtime\": []\n    },\n    \"external_libraries\": [\n      {\n        \"name\": \"calc\",\n        \"vendor_path\": \"lib\"\n      }\n    ],\n    \"cmake\": {\n      \"find_packages\": [],\n      \"extra_sources\": [],\n      \"extra_include_dirs\": [\"lib\"],\n      \"extra_link_libraries\": []\n    }\n  }\n}\n```\n\n**Key fields explained:**\n\n| Field                                  | What it does                                                                                                                                                                                                                                                                                                        |\n| -------------------------------------- | ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- |\n| `name`                                 | Module name \u2014 must be a valid C identifier (used in filenames, method calls)                                                                                                                                                                                                                                        |\n| `nix.external_libraries`               | Declares C/C++ libraries vendored in the repo. Each entry has a `name` (used for the Nix derivation and CMake target) and `vendor_path` (directory containing the source). The build system compiles the library and makes it available as a CMake target                                                            |\n| `nix.cmake.extra_include_dirs`         | Added to the CMake include path so your C++ code can `#include \"libcalc.h\"`                                                                                                                                                                                                                                         |", "execs": [{"kind": "file", "cmd": "write metadata.json", "status": "pass", "note": "Wrote metadata.json"}]}, {"md": "### 3.2 `CMakeLists.txt` \u2014 Build File\n\n> **Edit:** Change `project()` name, `NAME`, `SOURCES` filenames, and `EXTERNAL_LIBS` to match your module and library.\n\n```cmake\ncmake_minimum_required(VERSION 3.14)\nproject(CalcModulePlugin LANGUAGES CXX)\n\n# Include the Logos Module CMake helper (provided by logos-module-builder)\nif(DEFINED ENV{LOGOS_MODULE_BUILDER_ROOT})\n    include($ENV{LOGOS_MODULE_BUILDER_ROOT}/cmake/LogosModule.cmake)\nelseif(EXISTS \"${CMAKE_CURRENT_SOURCE_DIR}/cmake/LogosModule.cmake\")\n    include(cmake/LogosModule.cmake)\nelse()\n    message(FATAL_ERROR \"LogosModule.cmake not found\")\nendif()\n\n# Define the module with its external library dependency\nlogos_module(\n    NAME calc_module\n    SOURCES\n        src/calc_module_interface.h\n        src/calc_module_plugin.h\n        src/calc_module_plugin.cpp\n    EXTERNAL_LIBS\n        calc\n)\n```\n\nThe template generates this with default names (e.g., `external_lib`). You **must** update:\n\n- **`project()`** \u2014 rename to match your module (e.g., `CalcModulePlugin`)\n- **`NAME`** \u2014 your module name (must match `name` in `metadata.json`, e.g., `calc_module`)\n- **`SOURCES`** \u2014 your renamed source files\n- **`EXTERNAL_LIBS`** \u2014 names of external libraries to link (must match `nix.external_libraries[].name` in `metadata.json`)\n\nThe `if/elseif/else` block above it is boilerplate \u2014 don't change it.\n\n> **Common mistake:** If `NAME` doesn't match `name` in `metadata.json`, the build will succeed but the install phase will fail because it looks for `<name>_plugin.dylib` based on `metadata.json`.\n\n**How `EXTERNAL_LIBS calc` works:** The `logos_module()` CMake function searches `lib/` for `libcalc.so` (Linux) or `libcalc.dylib` (macOS), links it to your plugin, and sets up RPATH so the library is found at runtime.", "execs": [{"kind": "file", "cmd": "write CMakeLists.txt", "status": "pass", "note": "Wrote CMakeLists.txt"}]}, {"md": "### 3.3 `flake.nix` \u2014 Nix Build Config\n\nChange `description`. Add flake inputs here if your module depends on other modules or fetches a library from source.\n\n```nix\n{\n  description = \"Calculator module - wraps libcalc C library for Logos\";\n\n  inputs = {\n    logos-module-builder.url = \"github:logos-co/logos-module-builder\";\n  };\n\n  outputs = inputs@{ logos-module-builder, ... }:\n    logos-module-builder.lib.mkLogosModule {\n      src = ./.;\n      configFile = ./metadata.json;\n      flakeInputs = inputs;\n    };\n}\n```\n\nThat's it \u2014 `mkLogosModule` handles all the Nix complexity (fetching Qt, the SDK, the code generator, setting up include paths, etc.). Note that `configFile` points to `metadata.json` (the single source of truth) and `flakeInputs = inputs` passes all flake inputs to the builder so that dependencies declared in `metadata.json` are resolved automatically.\n\n> **Naming flake inputs:** When adding module dependencies, the flake input attribute name **must match** the `name` field in that dependency's `metadata.json`. For example, if you depend on a module whose `metadata.json` has `\"name\": \"waku_module\"`, your flake input must be `waku_module.url = \"github:logos-co/logos-waku-module\"`.", "execs": [{"kind": "file", "cmd": "write flake.nix", "status": "pass", "note": "Wrote flake.nix"}]}, {"md": "### 3.4 `src/calc_module_interface.h` \u2014 Interface Declaration\n\nThis declares the methods your module exposes. It inherits from `PluginInterface` (provided by the Logos C++ SDK). Every method you want callable by other modules must be `Q_INVOKABLE` and `virtual`.\n\n```cpp\n#ifndef CALC_MODULE_INTERFACE_H\n#define CALC_MODULE_INTERFACE_H\n\n#include <QObject>\n#include <QString>\n#include \"interface.h\"\n\nclass CalcModuleInterface : public PluginInterface\n{\npublic:\n    virtual ~CalcModuleInterface() = default;\n\n    Q_INVOKABLE virtual int add(int a, int b) = 0;\n    Q_INVOKABLE virtual int multiply(int a, int b) = 0;\n    Q_INVOKABLE virtual int factorial(int n) = 0;\n    Q_INVOKABLE virtual int fibonacci(int n) = 0;\n    Q_INVOKABLE virtual QString libVersion() = 0;\n};\n\n#define CalcModuleInterface_iid \"org.logos.CalcModuleInterface\"\nQ_DECLARE_INTERFACE(CalcModuleInterface, CalcModuleInterface_iid)\n\n#endif // CALC_MODULE_INTERFACE_H\n```\n\n**Rules for the interface:**\n\n- Every method you want callable by other modules must be `Q_INVOKABLE` and `virtual`\n- Supported parameter/return types: `int`, `bool`, `QString`, `QByteArray`, `QVariant`, `QJsonArray`, `QStringList`, `LogosResult`\n- The interface ID string (e.g., `\"org.logos.CalcModuleInterface\"`) must be unique across all modules", "execs": [{"kind": "file", "cmd": "write src/calc_module_interface.h", "status": "pass", "note": "Wrote src/calc_module_interface.h"}]}, {"md": "### 3.5 `src/calc_module_plugin.h` \u2014 Plugin Header\n\nThis is the actual plugin class. It inherits from both `QObject` (for Qt's meta-object system) and your interface.\n\n```cpp\n#ifndef CALC_MODULE_PLUGIN_H\n#define CALC_MODULE_PLUGIN_H\n\n#include <QObject>\n#include <QString>\n#include \"calc_module_interface.h\"\n\n// Include the C library header\n#include \"lib/libcalc.h\"\n\nclass LogosAPI;\n\nclass CalcModulePlugin : public QObject, public CalcModuleInterface\n{\n    Q_OBJECT\n    Q_PLUGIN_METADATA(IID CalcModuleInterface_iid FILE \"metadata.json\")\n    Q_INTERFACES(CalcModuleInterface PluginInterface)\n\npublic:\n    explicit CalcModulePlugin(QObject* parent = nullptr);\n    ~CalcModulePlugin() override;\n\n    // PluginInterface\n    QString name() const override { return \"calc_module\"; }\n    QString version() const override { return \"1.0.0\"; }\n\n    Q_INVOKABLE void initLogos(LogosAPI* api);\n\n    // CalcModuleInterface\n    Q_INVOKABLE int add(int a, int b) override;\n    Q_INVOKABLE int multiply(int a, int b) override;\n    Q_INVOKABLE int factorial(int n) override;\n    Q_INVOKABLE int fibonacci(int n) override;\n    Q_INVOKABLE QString libVersion() override;\n    Q_INVOKABLE void libVersionNotify();\n\nsignals:\n    void eventResponse(const QString& eventName, const QVariantList& args);\n\n};\n\n#endif // CALC_MODULE_PLUGIN_H\n```\n\n**Critical details:**\n\n- `Q_PLUGIN_METADATA(IID ... FILE \"metadata.json\")` \u2014 embeds the metadata into the binary\n- `Q_INTERFACES(CalcModuleInterface PluginInterface)` \u2014 registers both interfaces with Qt's plugin system\n- `initLogos` must be `Q_INVOKABLE` but **not** `override` \u2014 the base class `PluginInterface` does not declare it as virtual; the Logos host calls it reflectively via `QMetaObject::invokeMethod`\n- `eventResponse` signal is required for event forwarding between modules. Emit it to push data to subscribers (e.g., QML UIs listening via `logos.onModuleEvent()`)\n- `name()` must return the same string as the `name` field in `metadata.json`\n- **No `m_logosAPI` member variable** \u2014 the `LogosAPI*` pointer is stored in the global `logosAPI` variable defined in `liblogos`, not in a class member. See the `initLogos` implementation below.", "execs": [{"kind": "file", "cmd": "write src/calc_module_plugin.h", "status": "pass", "note": "Wrote src/calc_module_plugin.h"}]}, {"md": "### 3.6 `src/calc_module_plugin.cpp` \u2014 Plugin Implementation\n\nThis is where the wrapping happens. Each method calls the corresponding C function.\n\n```cpp\n#include \"calc_module_plugin.h\"\n#include \"logos_api.h\"\n#include <QDebug>\n\nCalcModulePlugin::CalcModulePlugin(QObject* parent)\n    : QObject(parent)\n{\n    qDebug() << \"CalcModulePlugin: created\";\n}\n\nCalcModulePlugin::~CalcModulePlugin()\n{\n    qDebug() << \"CalcModulePlugin: destroyed\";\n}\n\nvoid CalcModulePlugin::initLogos(LogosAPI* api)\n{\n    logosAPI = api;\n    qDebug() << \"CalcModulePlugin: LogosAPI initialized\";\n}\n\nint CalcModulePlugin::add(int a, int b)\n{\n    int result = calc_add(a, b);\n    qDebug() << \"CalcModulePlugin::add\" << a << \"+\" << b << \"=\" << result;\n    return result;\n}\n\nint CalcModulePlugin::multiply(int a, int b)\n{\n    int result = calc_multiply(a, b);\n    qDebug() << \"CalcModulePlugin::multiply\" << a << \"*\" << b << \"=\" << result;\n    return result;\n}\n\nint CalcModulePlugin::factorial(int n)\n{\n    int result = calc_factorial(n);\n    qDebug() << \"CalcModulePlugin::factorial\" << n << \"! =\" << result;\n    return result;\n}\n\nint CalcModulePlugin::fibonacci(int n)\n{\n    int result = calc_fibonacci(n);\n    qDebug() << \"CalcModulePlugin::fibonacci fib(\" << n << \") =\" << result;\n    return result;\n}\n\nQString CalcModulePlugin::libVersion()\n{\n    const char* ver = calc_version();\n    QString result = QString::fromUtf8(ver);\n    qDebug() << \"CalcModulePlugin::libVersion\" << result;\n    return result;\n}\n\nvoid CalcModulePlugin::libVersionNotify()\n{\n    const char* ver = calc_version();\n    QString result = QString::fromUtf8(ver);\n    qDebug() << \"CalcModulePlugin::libVersionNotify\" << result;\n    emit eventResponse(\"versionReady\", {result});\n}\n```\n\n**The wrapping pattern** is always the same:\n\n1. Call the C function with the arguments\n2. Convert the C result to a Qt type if needed (e.g., `const char*` \u2192 `QString`)\n3. Return the Qt type", "execs": [{"kind": "file", "cmd": "write src/calc_module_plugin.cpp", "status": "pass", "note": "Wrote src/calc_module_plugin.cpp"}]}, {"md": "## Step 4: Build the Module", "execs": []}, {"md": "### 4.1 Initialize the Git repo\n\nNix flakes require a git repository.\n\nBefore staging files, create a `.gitignore` to exclude build artifacts:\n\n```text\n# Nix build output\nresult\nresult-*\n\n# CMake build directory\nbuild/\n```", "execs": [{"kind": "file", "cmd": "write .gitignore", "status": "pass", "note": "Wrote .gitignore"}]}, {"md": "Then initialise the repo:\n\n```bash\ngit init\n```", "execs": [{"kind": "run", "cmd": "git init", "status": "pass", "exit_code": 0, "output": "hint: Using 'master' as the name for the initial branch. This default branch name\nhint: will change to \"main\" in Git 3.0. To configure the initial branch name\nhint: to use in all of your new repositories, which will suppress this warning,\nhint: call:\nhint:\nhint: \tgit config --global init.defaultBranch <name>\nhint:\nhint: Names commonly chosen instead of 'master' are 'main', 'trunk' and\nhint: 'development'. The just-created branch can be renamed via this command:\nhint:\nhint: \tgit branch -m <name>\nhint:\nhint: Disable this message with \"git config set advice.defaultBranchName false\"\nInitialized empty Git repository in /tmp/tutorial-chain-foivub3s/logos-calc-module/.git/\n", "note": ""}]}, {"md": "```bash\ngit add -A\n```", "execs": [{"kind": "run", "cmd": "git add -A", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nnix flake update\n```", "execs": [{"kind": "run", "cmd": "nix flake update", "status": "pass", "exit_code": 0, "output": "warning: Git tree '/tmp/tutorial-chain-foivub3s/logos-calc-module' has uncommitted changes\nwarning: \"method\":\"factorial\",\"module\":\"calc_module\",\"result\":120,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\n./logos/bin/logoscore call calc_module fibonacci 10\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call calc_module fibonacci 10", "status": "pass", "exit_code": 0, "output": "{\"method\":\"fibonacci\",\"module\":\"calc_module\",\"result\":55,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\n./logos/bin/logoscore call calc_module libVersion\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call calc_module libVersion", "status": "pass", "exit_code": 0, "output": "{\"method\":\"libVersion\",\"module\":\"calc_module\",\"result\":\"1.0.0\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\n./logos/bin/logoscore stop\n```\n\n> For inline (legacy) mode and other logoscore options, see the [Developer Guide -- Running with logoscore](logos-developer-guide.md#51-running-with-logoscore).\n\n**What happens under the hood:**\n\n1. `logoscore` scans `./modules/` for subdirectories containing `manifest.json`\n2. It finds `calc_module` and extracts metadata from the plugin binary\n3. It spawns a `logos_host` process that loads `calc_module_plugin.so`\n4. `logos_host` calls `initLogos()` on the plugin, providing a `LogosAPI*` for inter-module communication\n5. The call command is parsed: module name `calc_module`, method `add`, args `[3, 5]`\n6. `logoscore` sends the call to `logos_host` via Qt Remote Objects (IPC)\n7. `logos_host` invokes `CalcModulePlugin::add(3, 5)` which calls `calc_add(3, 5)` from libcalc\n8. The result is returned via IPC to `logoscore`\n\nYou'll see debug output like:\n\n```\nDebug: Found plugin: \"./modules/calc_module/calc_module_plugin.so\"\nDebug: Plugin Metadata:\nDebug:  - Name: \"calc_module\"\nDebug:  - Version: \"1.0.0\"\nDebug:  - Description: \"Calculator module wrapping libcalc C library\"\nDebug: Loading plugin: \"calc_module\" in separate process\nDebug: Executing call: \"calc_module\" . \"add\" with 2 params\nMethod call successful. Result: ...\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "## Package for Distribution (Optional)\n\nThe LGX package created in Step 5.2 is a **local** package \u2014 its libraries still reference `/nix/store` paths, so it only works on the machine that built it. To create a **portable** package that can be distributed to other machines:\n\n```bash\nnix build '.#lgx-portable'\n```\n\nPortable LGX packages are fully self-contained with no `/nix/store` references at runtime. These are the packages used by the Logos App Package Manager UI and published to [logos-modules](https://github.com/logos-co/logos-modules) releases.\n\nTo create both dev and portable variants (the dev variant works with local `nix build` of basecamp; the portable variant works with standalone basecamp builds), use `--out-link` to avoid overwriting the `result` symlink:\n\n```bash\nnix build '.#lgx' --out-link result-lgx\nnix build '.#lgx-portable' --out-link result-lgx-portable\n```\n\n> For more bundling options (standalone bundler syntax, cross-platform packaging), see the [Developer Guide \u2014 Bundling with nix-bundle-lgx](logos-developer-guide.md#32-bundling-with-nix-bundle-lgx).\n\nTo install a portable package on another machine:\n\n```bash\nnix build 'github:logos-co/logos-package-manager#cli' --out-link ./pm\n./pm/bin/lgpm --modules-dir ./modules install --file result-lgx-portable/*.lgx\n```\n\n> **Note:** Local builds of `logoscore` / `logos-basecamp` (via `nix build`) expect **local** `.lgx` packages. Portable builds (via `nix build '.#bin-bundle-dir'`, `.#bin-appimage`, or `.#bin-macos-app`) expect **portable** `.lgx` packages. See the [logos-basecamp README](https://github.com/logos-co/logos-basecamp/blob/master/README.md) for details.", "execs": []}, {"md": "## Common Wrapping Patterns\n\n### Wrapping C functions with opaque pointers\n\nMany C libraries use opaque pointers (handles) for state management:\n\n```c\n// C API\ntypedef struct db_ctx db_ctx_t;\ndb_ctx_t* db_open(const char* path);\nint db_get(db_ctx_t* ctx, const char* key, char* buf, int buf_len);\nvoid db_close(db_ctx_t* ctx);\n```\n\nStore the handle in your plugin class:\n\n```cpp\nclass DbModulePlugin : public QObject, public DbModuleInterface\n{\n    // ...\nprivate:\n    db_ctx_t* m_ctx = nullptr;\n\npublic:\n    Q_INVOKABLE bool open(const QString& path) {\n        m_ctx = db_open(path.toUtf8().constData());\n        return m_ctx != nullptr;\n    }\n\n    Q_INVOKABLE QString get(const QString& key) {\n        if (!m_ctx) return QString();\n        char buf[4096];\n        int len = db_get(m_ctx, key.toUtf8().constData(), buf, sizeof(buf));\n        if (len < 0) return QString();\n        return QString::fromUtf8(buf, len);\n    }\n\n    ~DbModulePlugin() {\n        if (m_ctx) db_close(m_ctx);\n    }\n};\n```\n\n### Wrapping C callbacks\n\nC libraries often use callbacks for async operations:\n\n```c\ntypedef void (*event_cb)(int code, const char* msg, void* user_data);\nvoid lib_set_callback(void* ctx, event_cb cb, void* user_data);\n```\n\nUse a static method as the callback, passing `this` as `user_data`:\n\n```cpp\nclass MyPlugin : public QObject, public MyInterface\n{\n    // ...\n    static void c_callback(int code, const char* msg, void* user_data) {\n        auto* self = static_cast<MyPlugin*>(user_data);\n        // Forward to Qt signal (thread-safe)\n        emit self->eventResponse(\"lib_event\",\n            QVariantList() << code << QString::fromUtf8(msg));\n    }\n\n    Q_INVOKABLE void startListening() {\n        lib_set_callback(m_ctx, c_callback, this);\n    }\n};\n```\n\n### Wrapping C libraries that allocate strings\n\nIf the C library returns allocated strings that must be freed:\n\n```cpp\nQ_INVOKABLE QString getData() {\n    char* c_str = lib_get_data(m_ctx);  // Library allocates\n    QString result = QString::fromUtf8(c_str);\n    lib_free_string(c_str);              // Library deallocates\n    return result;\n}\n```\n\n### String conversion reference\n\n| C type                 | Qt type           | C \u2192 Qt                     | Qt \u2192 C                     |\n| ---------------------- | ----------------- | -------------------------- | -------------------------- |\n| `const char*`          | `QString`         | `QString::fromUtf8(c_str)` | `str.toUtf8().constData()` |\n| `const char*` (binary) | `QByteArray`      | `QByteArray(data, len)`    | `ba.data()`, `ba.size()`   |\n| `int`                  | `int`             | direct                     | direct                     |\n| `bool` / `int`         | `bool`            | `result != 0`              | direct                     |\n| `void*`                | (store in member) | \u2014                          | \u2014                          |", "execs": []}, {"md": "## Advanced: Wrapping a Library from a Flake Input\n\nInstead of pre-building the library and placing it in `lib/`, you can have Nix fetch and build it from source. This is useful for libraries hosted on GitHub.\n\n### flake.nix with external library input\n\n```nix\n{\n  description = \"Module wrapping libfoo from GitHub\";\n\n  inputs = {\n    logos-module-builder.url = \"github:logos-co/logos-module-builder\";\n\n    # Fetch the library source (non-flake)\n    libfoo-src = {\n      url = \"github:example/libfoo\";\n      flake = false;\n    };\n  };\n\n  outputs = inputs@{ logos-module-builder, libfoo-src, ... }:\n    logos-module-builder.lib.mkLogosModule {\n      src = ./.;\n      configFile = ./metadata.json;\n      flakeInputs = inputs;\n\n      # Pass the fetched source to the builder\n      externalLibInputs = {\n        foo = libfoo-src;\n      };\n    };\n}\n```\n\n### metadata.json for flake input\n\n```json\n{\n  \"name\": \"foo_module\",\n  \"version\": \"1.0.0\",\n  \"type\": \"core\",\n  \"description\": \"Module wrapping libfoo\",\n  \"main\": \"foo_module_plugin\",\n  \"dependencies\": [],\n\n  \"nix\": {\n    \"packages\": { \"build\": [], \"runtime\": [] },\n    \"external_libraries\": [\n      {\n        \"name\": \"foo\",\n        \"flake_input\": \"github:example/libfoo\",\n        \"build_command\": \"make shared\",\n        \"output_pattern\": \"build/libfoo.*\"\n      }\n    ],\n    \"cmake\": {\n      \"find_packages\": [],\n      \"extra_sources\": [],\n      \"extra_include_dirs\": [\"lib\"],\n      \"extra_link_libraries\": []\n    }\n  }\n}\n```\n\n**Key difference:** The `externalLibInputs` key in flake.nix (`foo`) must match the `name` field in `nix.external_libraries` (`foo`). The builder will:\n\n1. Clone the source from the flake input\n2. Run `build_command` (`make shared`)\n3. Search for output files matching `output_pattern`\n4. Copy the resulting `.so`/`.dylib` and headers to `lib/`\n5. Proceed with the normal module build\n\n### For Go libraries\n\nIf the external library is written in Go with C bindings (`cgo`), set `go_build: true` in the `nix.external_libraries` entry within `metadata.json`:\n\n```json\n{\n  \"nix\": {\n    \"external_libraries\": [\n      {\n        \"name\": \"mygolib\",\n        \"flake_input\": \"github:example/mygolib\",\n        \"go_build\": true,\n        \"output_pattern\": \"libmygolib.*\"\n      }\n    ]\n  }\n}\n```\n\nSetting `go_build: true` enables the Go toolchain and sets `CGO_ENABLED=1`.", "execs": []}, {"md": "## Real-World Example: logos-libp2p-module\n\nThe [logos-libp2p-module](https://github.com/logos-co/logos-libp2p-module) is a production module that wraps the `nim-libp2p` library (compiled to a C shared library). Key files:\n\n- `**flake.nix**` \u2014 Uses `externalLibInputs` to fetch the nim-libp2p C bindings from a GitHub flake\n- `**metadata.json**` \u2014 Declares `nim_libp2p` as an external library with `go_build: false` in the `nix` section\n- `**src/plugin.cpp**` \u2014 Wraps ~40 C functions (`libp2p_new`, `libp2p_start`, `libp2p_connect`, `libp2p_dial`, `libp2p_gossipsub_subscribe`, etc.) as `Q_INVOKABLE` methods\n- `**tests/**` \u2014 Qt test suite that exercises every wrapped function\n\nIt follows the exact same pattern as this tutorial, just at a larger scale.", "execs": []}, {"md": "## Troubleshooting\n\n### `initLogos` marked 'override', but does not override\n\n```\nerror: 'void MyPlugin::initLogos(LogosAPI*)' marked 'override', but does not override\n```\n\n**Fix:** Remove the `override` keyword from `initLogos`. The base `PluginInterface` class does not declare it as virtual. The Logos host calls it reflectively via `QMetaObject::invokeMethod`. Declare it as:\n\n```cpp\nQ_INVOKABLE void initLogos(LogosAPI* api);  // No override!\n```\n\n### Library not found at runtime\n\n```\nCannot load library calc_module_plugin.so: libcalc.so: cannot open shared object file\n```\n\n**Fix:** Ensure `libcalc.so` / `libcalc.dylib` is in the same directory as the plugin. The build system sets RPATH to `$ORIGIN` (Linux) / `@loader_path` (macOS) so the plugin looks for libraries in its own directory.\n\n### `initLogos` stores API pointer in wrong variable\n\nIf inter-module calls or API features silently fail, check that `initLogos` assigns to the **global** `logosAPI` variable (defined in the Logos SDK / liblogos), not to a class member like `m_logosAPI`:\n\n```cpp\n// CORRECT \u2014 uses the global variable from liblogos\nvoid MyPlugin::initLogos(LogosAPI* api)\n{\n    logosAPI = api;\n}\n\n// WRONG \u2014 stores in a local member, API calls won't work\nvoid MyPlugin::initLogos(LogosAPI* api)\n{\n    m_logosAPI = api;\n}\n```\n\n### Plugin not discovered by logoscore\n\n**Check:**\n\n1. The module is in a **subdirectory** of the modules dir (e.g., `modules/calc_module/`)\n2. The subdirectory contains a `manifest.json` with a valid `main` object\n3. The platform key in `main` matches your OS/arch (e.g., `linux-aarch64`, `darwin-arm64`)\n\n### `nix build .#lib` does nothing or fails silently\n\nSome shells (notably zsh) treat `#` as a comment character. Always quote the flake reference:\n\n```bash\n# Correct\nnix build '.#lib'\n\n# May fail in zsh\nnix build .#lib\n```\n\n### First build is slow\n\nThe first `nix build` downloads Qt 6, the Logos C++ SDK, the code generator, and other dependencies. This is a one-time cost \u2014 subsequent builds use the Nix cache and are fast (usually under 30 seconds).\n\n### Symbol not found errors\n\nIf you get \"undefined symbol\" errors for your C library functions:\n\n1. Verify the `.so`/`.dylib` is in `lib/` before building\n2. Verify the header has `extern \"C\"` guards\n3. Check the symbols are exported: `nm -D lib/libcalc.so | grep calc`", "execs": []}]}, {"meta": {"name": "Tutorial Part 2: Building a QML UI for Your Logos Module", "platform": "Linux (ext=so)", "release": "(none)"}, "rows": [{"md": "# Tutorial Part 2: Building a QML UI for Your Logos Module\n\nThis is Part 2 of the Logos module tutorial series. In [Part 1](tutorial-wrapping-c-library.md) you wrapped a C library as a Logos core module. Now you'll build a **QML user interface** that calls that module \u2014 first isolated with `nix run`, then packaged and loaded into `logos-basecamp`.\n\n**What you'll build:** A `calc_ui` QML plugin with input fields and buttons that call `calc_module` methods (add, multiply, factorial, fibonacci) through the Logos bridge.\n\n**What you'll learn:**\n\n- How QML UI plugins work in the Logos platform\n- The `logos.callModule()` bridge that connects QML to core modules\n- The project structure and metadata for a QML plugin\n- How to package and install your UI into `logos-basecamp`\n\n## Prerequisites\n\n- Completed [Part 1](tutorial-wrapping-c-library.md) \u2014 you have a working `calc_module` with the shared library built (`.so` on Linux, `.dylib` on macOS in `logos-calc-module/lib/`)\n- Nix with flakes enabled (same as Part 1)\n- Basic familiarity with QML (Qt's declarative UI language)", "execs": []}, {"md": "## How QML UI Plugins Work\n\nBefore writing code, let's understand the architecture:\n\n```\n+-------------------+     logos.callModule()      +-------------------+\n|    calc_ui        | --------------------------> |   calc_module     |\n|  Main.qml (QML)   |     IPC (Qt Remote Objects) |   C++ plugin      |\n+-------------------+                             +-------------------+\n        ^                                                  ^\n        \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 loaded by \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n                     logos-basecamp / logos-standalone-app\n```\n\nKey points:\n\n- **No compilation.** A QML plugin is just `.qml` files and a `metadata.json`.\n- **Sandboxed.** No network access, no filesystem access outside the module directory.\n- **The `logos` bridge** is injected by the host. Call core modules with `logos.callModule(\"module\", \"method\", [args])`.\n- **Entry point** is defined by the required `\"view\"` field in `metadata.json` (for this tutorial it is `Main.qml`).", "execs": []}, {"md": "## Step 1: Scaffold\n\nCreate a new directory and initialise it from the QML module template:\n\n`mkdir logos-calc-ui && cd logos-calc-ui`", "execs": []}, {"md": "```bash\nnix flake init -t github:logos-co/logos-module-builder#ui-qml\n```\n\n> **Note:** The generated `flake.nix` uses an unpinned `logos-module-builder` URL. Replace it with the pinned version shown in [Step 4](#step-4-update-flakenix) to ensure reproducible builds.", "execs": [{"kind": "run", "cmd": "nix flake init -t github:logos-co/logos-module-builder#ui-qml", "status": "pass", "exit_code": 0, "output": "wrote: \"/tmp/tutorial-chain-foivub3s/logos-calc-ui/Main.qml\"\nwrote: \"/tmp/tutorial-chain-foivub3s/logos-calc-ui/flake.nix\"\nwrote: \"/tmp/tutorial-chain-foivub3s/logos-calc-ui/metadata.json\"\n", "note": ""}]}, {"md": "```bash\ngit init\n```", "execs": [{"kind": "run", "cmd": "git init", "status": "pass", "exit_code": 0, "output": "hint: Using 'master' as the name for the initial branch. This default branch name\nhint: will change to \"main\" in Git 3.0. To configure the initial branch name\nhint: to use in all of your new repositories, which will suppress this warning,\nhint: call:\nhint:\nhint: \tgit config --global init.defaultBranch <name>\nhint:\nhint: Names commonly chosen instead of 'master' are 'main', 'trunk' and\nhint: 'development'. The just-created branch can be renamed via this command:\nhint:\nhint: \tgit branch -m <name>\nhint:\nhint: Disable this message with \"git config set advice.defaultBranchName false\"\nInitialized empty Git repository in /tmp/tutorial-chain-foivub3s/logos-calc-ui/.git/\n", "note": ""}]}, {"md": "```bash\ngit add -A\n```\n\nThis gives you:\n\n```\nlogos-calc-ui/\n\u251c\u2500\u2500 flake.nix       # Nix build + nix run support\n\u251c\u2500\u2500 metadata.json   # Plugin metadata\n\u2514\u2500\u2500 Main.qml        # Your UI (starter template)\n```", "execs": [{"kind": "run", "cmd": "git add -A", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 2: Update `metadata.json`\n\nReplace the template contents with your plugin's details. The template may generate an extra `nix` section \u2014 keep it as-is, it's used by the builder:", "execs": []}, {"md": "```json\n{\n  \"name\": \"calc_ui\",\n  \"version\": \"1.0.0\",\n  \"description\": \"Calculator UI - QML frontend for the calc_module\",\n  \"type\": \"ui_qml\",\n  \"view\": \"Main.qml\",\n  \"dependencies\": [\"calc_module\"],\n  \"category\": \"tools\",\n  \"icon\": \"icons/calc.png\",\n\n  \"nix\": {\n    \"packages\": {\n      \"build\": [],\n      \"runtime\": []\n    },\n    \"external_libraries\": [],\n    \"cmake\": {\n      \"find_packages\": [],\n      \"extra_sources\": [],\n      \"extra_include_dirs\": [],\n      \"extra_link_libraries\": []\n    }\n  }\n}\n```\n\nCreate the icon directory and add a placeholder icon. The icon is displayed in the `logos-basecamp` sidebar when the module is loaded:", "execs": [{"kind": "file", "cmd": "write metadata.json", "status": "pass", "note": "Wrote metadata.json"}]}, {"md": "```bash\nmkdir -p icons\n# Copy any PNG here \u2014 or generate a 64\u00d764 placeholder:\necho \"iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAAmElEQVR4nO3QMREAIBDAsFeEN3ziCWRkoEP2XmedfX82OkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAO0BN/SiO/PatoIAAAAASUVORK5CYII=\" | base64 -d > icons/calc.png\n```\n\nThe `view` field tells the host which QML file to load for the UI. The `dependencies` field tells the host to load `calc_module` before showing your UI.\n\n> **Naming convention:** Each entry in `dependencies` must match the `name` field in that module's own `metadata.json`. When adding a dependency as a flake input, the **input attribute name** must also match the dependency name \u2014 e.g., the input must be called `calc_module`. The URL can point anywhere (a local `path:` or a remote `github:` repo); the attribute name is how the builder resolves dependencies.", "execs": [{"kind": "run", "cmd": "mkdir -p icons && echo 'iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAAmElEQVR4nO3QMREAIBDAsFeEN3ziCWRkoEP2XmedfX82OkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAO0BN/SiO/PatoIAAAAASUVORK5CYII=' | base64 -d > icons/calc.png", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 3: Write `Main.qml`\n\nReplace the starter file with the calculator UI. This demonstrates two communication patterns:\n\n1. **Direct calls** \u2014 `logos.callModule()` sends a request and returns the result immediately\n2. **Event-based** \u2014 `logos.callModule()` fires-and-forgets, the module emits an event, and QML receives it via `logos.onModuleEvent()`", "execs": []}, {"md": "```qml\nimport QtQuick\nimport QtQuick.Controls\nimport QtQuick.Layouts\n\nItem {\n    id: root\n\n    property string result: \"\"\n    property string errorText: \"\"\n    property string versionFromEvent: \"\"\n\n    // \u2500\u2500 Event subscription \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    // Subscribe to \"versionReady\" events pushed from calc_module.\n    Component.onCompleted: {\n        if (typeof logos !== \"undefined\" && logos.onModuleEvent)\n            logos.onModuleEvent(\"calc_module\", \"versionReady\")\n    }\n\n    Connections {\n        target: typeof logos !== \"undefined\" ? logos : null\n        function onModuleEventReceived(moduleName, eventName, data) {\n            if (eventName === \"versionReady\")\n                root.versionFromEvent = data[0]\n        }\n    }\n\n    ColumnLayout {\n        anchors.fill: parent\n        anchors.margins: 24\n        spacing: 16\n\n        // \u2500\u2500 Title \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n        Text {\n            text: \"Logos Calculator\"\n            font.pixelSize: 20\n            font.weight: Font.DemiBold\n            color: \"#ffffff\"\n            Layout.alignment: Qt.AlignHCenter\n        }\n\n        // \u2500\u2500 Pattern 1: Direct call (request -> response) \u2500\u2500\u2500\u2500\u2500\u2500\n        Text {\n            text: \"Direct calls (logos.callModule -> returns result)\"\n            color: \"#8b949e\"\n            font.pixelSize: 12\n        }\n\n        RowLayout {\n            spacing: 12\n            Layout.fillWidth: true\n\n            TextField {\n                id: inputA\n                placeholderText: \"a\"\n                Layout.preferredWidth: 80\n                validator: IntValidator {}\n            }\n\n            TextField {\n                id: inputB\n                placeholderText: \"b\"\n                Layout.preferredWidth: 80\n                validator: IntValidator {}\n            }\n\n            Button {\n                text: \"Add\"\n                onClicked: callTwoOp(\"add\", inputA.text, inputB.text)\n            }\n\n            Button {\n                text: \"Multiply\"\n                onClicked: callTwoOp(\"multiply\", inputA.text, inputB.text)\n            }\n        }\n\n        RowLayout {\n            spacing: 12\n            Layout.fillWidth: true\n\n            TextField {\n                id: inputN\n                placeholderText: \"n\"\n                Layout.preferredWidth: 80\n                validator: IntValidator { bottom: 0 }\n            }\n\n            Button {\n                text: \"Factorial\"\n                onClicked: callOneOp(\"factorial\", inputN.text)\n            }\n\n            Button {\n                text: \"Fibonacci\"\n                onClicked: callOneOp(\"fibonacci\", inputN.text)\n            }\n\n            Button {\n                text: \"libcalc version\"\n                onClicked: callModule(\"libVersion\", [])\n            }\n        }\n\n        // Direct call result\n        Rectangle {\n            Layout.fillWidth: true\n            height: 56\n            color: root.errorText.length > 0 ? \"#3d1a1a\" : \"#1a2d1a\"\n            radius: 8\n\n            Text {\n                anchors.centerIn: parent\n                text: root.errorText.length > 0 ? root.errorText\n                        : (root.result.length > 0 ? root.result : \"Enter values and press a button\")\n                color: root.errorText.length > 0 ? \"#f85149\" : \"#56d364\"\n                font.pixelSize: 15\n            }\n        }\n\n        // \u2500\u2500 Pattern 2: Event-based (fire-and-forget -> event) \u2500\n        Text {\n            text: \"Event-based (fire-and-forget call -> result via event)\"\n            color: \"#8b949e\"\n            font.pixelSize: 12\n        }\n\n        RowLayout {\n            spacing: 12\n            Layout.fillWidth: true\n\n            Button {\n                text: \"libcalc version (event)\"\n                onClicked: {\n                    if (typeof logos !== \"undefined\" && logos.callModule)\n                        logos.callModule(\"calc_module\", \"libVersionNotify\", [])\n                }\n            }\n        }\n\n        // Event result\n        Rectangle {\n            Layout.fillWidth: true\n            height: 56\n            color: \"#1a1a2d\"\n            radius: 8\n\n            Text {\n                anchors.centerIn: parent\n                text: root.versionFromEvent.length > 0\n                      ? (\"Version (via event): \" + root.versionFromEvent)\n                      : \"Press the event button \u2014 result arrives via event\"\n                color: \"#7ab8ff\"\n                font.pixelSize: 15\n            }\n        }\n\n        Item { Layout.fillHeight: true }\n    }\n\n    // \u2500\u2500 Direct call helpers \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\n    function callModule(method, args) {\n        root.errorText = \"\"\n        root.result = \"\"\n\n        if (typeof logos === \"undefined\" || !logos.callModule) {\n            root.errorText = \"Logos bridge not available\"\n            return\n        }\n\n        root.result = String(logos.callModule(\"calc_module\", method, args))\n    }\n\n    function callTwoOp(method, a, b) {\n        if (a === \"\" || b === \"\") { root.errorText = \"Enter values for a and b\"; return }\n        callModule(method, [parseInt(a), parseInt(b)])\n    }\n\n    function callOneOp(method, n) {\n        if (n === \"\") { root.errorText = \"Enter a value for n\"; return }\n        callModule(method, [parseInt(n)])\n    }\n}\n```\n\nThe UI demonstrates two communication patterns:\n\n- **Green section (direct calls):** `logos.callModule(\"calc_module\", \"libVersion\", [])` sends a request to `calc_module` and returns the result synchronously. Simple request/response.\n\n- **Blue section (event-based):** `logos.callModule(\"calc_module\", \"libVersionNotify\", [])` calls the module but ignores the return value. Instead, the module emits a `\"versionReady\"` event via `eventResponse`, and the QML receives it through the `logos.onModuleEvent()` subscription set up in `Component.onCompleted`.\n\nThe `logos` object is injected by the host at runtime.", "execs": [{"kind": "file", "cmd": "write Main.qml", "status": "pass", "note": "Wrote Main.qml"}]}, {"md": "## Step 4: Update `flake.nix`\n\nThe template already has everything wired up. Update the description and add `calc_module` as a dependency input:", "execs": []}, {"md": "```nix\n{\n  description = \"Calculator QML UI Plugin for Logos - frontend for calc_module\";\n\n  inputs = {\n    logos-module-builder.url = \"github:logos-co/logos-module-builder\";\n\n    # Points at your local calc_module checkout. This is a placeholder \u2014\n    # you lock it to your actual path in the next step with\n    # `nix flake update --override-input` (see \"Test with nix run\" below).\n    calc_module.url = \"path:/path/to/your/calc_module\";\n  };\n\n  outputs = inputs@{ logos-module-builder, ... }:\n    logos-module-builder.lib.mkLogosQmlModule {\n      src = ./.;\n      configFile = ./metadata.json;\n      flakeInputs = inputs;\n    };\n}\n```\n\nThe input attribute name (`calc_module`) must match the dependency name in `metadata.json`.\n\nThe placeholder `path:/path/to/your/calc_module` is **not** meant to be edited by hand \u2014 Nix won't let a `flake.nix` input use a relative path like `../logos-calc-module` (the flake is evaluated from a sandboxed copy, so `..` escapes it). Instead you point it at your real checkout **once** via `--override-input` in the next step, which records the resolved absolute path in `flake.lock`. After that, plain `nix run` uses the locked path with no override needed.\n\n- **`path:`** (used here) \u2014 a local directory on disk. Best for developing `calc_module` and its UI side by side, no network.\n- **`github:`** \u2014 fetches `calc_module` from a remote repo instead (for CI, or once it's published to its own repo), e.g. `calc_module.url = \"github:your-org/your-calc-module\";`.\n\n> **Important:** Whichever URL scheme you use, `calc_module` must be built with its shared library (`.so` on Linux, `.dylib` on macOS) present in `lib/`. If the library is missing, the nix build will fail with linker errors. See [Part 1, Step 1.5](tutorial-wrapping-c-library.md#15-build-the-shared-library) for build instructions.\n\n`mkLogosQmlModule` handles everything \u2014 it stages QML files, metadata, and icons into a plugin directory, bundles all module dependencies (direct and transitive) from their LGX packages, and automatically wires up `apps.default` so `nix run .` launches the UI in a standalone window with all required backend modules self-contained. `flakeInputs = inputs` passes all inputs so that dependencies declared in `metadata.json` are resolved automatically.", "execs": [{"kind": "file", "cmd": "write flake.nix", "status": "pass", "note": "Wrote flake.nix"}]}, {"md": "## Step 5: Test with `nix run`", "execs": []}, {"md": "### 5.1 UI only (layout preview)\n\n```bash\ngit add -A\n```", "execs": [{"kind": "run", "cmd": "git add -A", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nnix flake update --override-input calc_module path:../logos-calc-module\n```", "execs": [{"kind": "run", "cmd": "nix flake update --override-input calc_module path:../logos-calc-module", "status": "pass", "exit_code": 0, "output": "warning: Git tree '/tmp/tutorial-chain-foivub3s/logos-calc-ui' has uncommitted changes\nwarning: creating lock file \"/tmp/tutorial-chain-foivub3s/logos-calc-ui/flake.lock\": \n\u2022 Added input 'calc_module':\n    'path:/tmp/tutorial-chain-foivub3s/logos-calc-module'\n\u2022 Added input 'calc_module/logos-module-builder':\n    'github:logos-co/logos-module-builder/131faf1' (2026-05-29)\n\u2022 Added input 'calc_module/logos-module-builder/logos-cpp-sdk':\n    'github:logos-co/logos-cpp-sdk/d77c3dd' (2026-05-25)\n\u2022 Added input 'calc_module/logos-module-builder/logos-cpp-sdk/logos-nix':\n    'github:logos-co/logos-nix/e637a1f' (2026-03-25)\n\u2022 Added input 'calc_module/logos-module-builder/logos-cpp-sdk/logos-nix/nixpkgs':\n    'github:NixOS/nixpkgs/e9f00bd' (2025-09-28)\n\u2022 Added input 'calc_module/logos-module-builder/logos-cpp-sdk/nixpkgs':\n    follows 'calc_module/logos-module-builder/logos-cpp-sdk/logos-nix/nixpkgs'\n\u2022 Added input 'calc_module/logos-module-builder/logos-module':\n    'github:logos-co/logos-module/1947784' (2026-04-16)\n\u2022 Added input 'calc_module/logos-module-builder/logos-module/logos-nix':\n    'github:logos-co/logos-nix/0e9e6d6' (2026-03-19)\n\u2022 Added input 'calc_module/logos-module-builder/logos-module/logos-nix/nixpkgs':\n    'github:NixOS/nixpkgs/e9f00bd' (2025-09-28)\n\u2022 Added input 'calc_module/logos-module-builder/logos-module/nixpkgs':\n    follows 'calc_module/logos-module-builder/logos-module/logos-nix/nixpkgs'\n\u2022 Added input 'calc_module/logos-module-builder/logos-nix':\n    'github:logos-co/logos-nix/e637a1f' (2026-03-25)\n\u2022 Added input 'calc_module/logos-module-builder/logos-nix/nixpkgs':\n    'github:NixOS/nixpkgs/e9f00bd' (2025-09-28)\n\u202 f the file is missing, build it first (as covered in [Part 1, Step 1.5](tutorial-wrapping-c-library.md#15-build-the-shared-library)):\n\n```bash\ncd ../logos-calc-module/lib\ngcc -shared -fPIC -o libcalc.so libcalc.c     # Linux\n# gcc -shared -fPIC -o libcalc.dylib libcalc.c  # macOS\ncd ../../logos-calc-ui\n```\n\nAlso make sure the module itself builds successfully:", "execs": [{"kind": "run", "cmd": "ls ../logos-calc-module/lib/libcalc.so", "status": "pass", "exit_code": 0, "output": "../logos-calc-module/lib/libcalc.so\n", "note": ""}, {"kind": "run", "cmd": "cd ../logos-calc-module/lib && gcc -shared -fPIC -o libcalc.so libcalc.c && cd ../../logos-calc-ui", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\ncd ../logos-calc-module\ngit add -A\nnix build\ncd ../logos-calc-ui\n```\n\nThe `nix build` produces `result/lib/calc_module_plugin.so` (or `.dylib`), which is the compiled Qt plugin. The `lib/libcalc.so` (or `.dylib`) inside the source tree is the underlying C library that gets linked in during the build.", "execs": [{"kind": "run", "cmd": "cd ../logos-calc-module && git add -A && nix build && cd ../logos-calc-ui", "status": "pass", "exit_code": 0, "output": "warning: Git tree '/tmp/tutorial-chain-foivub3s/logos-calc-module' has uncommitted changes\nthese 2 paths will be fetched (1.2 MiB download, 3.6 MiB unpacked):\n  /nix/store/xihcqf8amrfvxfs9489nfwgl04rb1l7m-logos-calc_module-module\n  /nix/store/9hm8mdg5iqsjvxakhmhz77ahfhxq26hx-logos-calc_module-module-lib-1.0.0\ncopying path '/nix/store/9hm8mdg5iqsjvxakhmhz77ahfhxq26hx-logos-calc_module-module-lib-1.0.0' from 'https://logos-co.cachix.org'...\ncopying path '/nix/store/xihcqf8amrfvxfs9489nfwgl04rb1l7m-logos-calc_module-module' from 'https://logos-co.cachix.org'...\n", "note": ""}]}, {"md": "### 6.2 Option A: Use `--override-input` (quick, no flake.nix edits)\n\nYou can point `calc_module` at your local checkout for a single command, without touching `flake.nix` or its lock \u2014 handy for a one-off run or when the input is set to a `github:` URL:\n\n```bash\nnix run . --override-input calc_module path:../logos-calc-module\n```\n\nThis tells nix to resolve the `calc_module` flake input from your local directory instead of from the remote URL. Any changes you've made to `calc_module` locally (including the built `.so`/`.dylib` in `lib/`) are picked up immediately \u2014 no need to push to GitHub first.", "execs": [{"kind": "ui_test", "cmd": "nix run . --override-input calc_module path:../logos-calc-module\n\n# test actions:\n- App title visible: wait for ['Logos Calculator']\n- All operation buttons visible: wait for ['Add', 'Multiply', 'Factorial', 'Fibonacci']", "status": "pass", "output": "\nRunning 1 test(s)...\n\n  \u001b[32m\u2713\u001b[0m Tutorial Part 2: Building a QML UI for Your Logos Module: Option A: Use `--override-input` (quick, no flake.nix edits)\n\n1 passed, 0 failed\n\n", "note": ""}]}, {"md": "### 6.3 Option B: Lock `path:` once, then run normally\n\nIf you're iterating on both repos side by side, lock `calc_module` to your local checkout once. You can't write `path:../logos-calc-module` directly into `flake.nix` \u2014 Nix evaluates the flake from a sandboxed copy, so a relative `..` escapes it and is rejected. Instead, lock it with an `--override-input` (which resolves to an absolute path and stores it in `flake.lock`):\n\n```bash\nnix flake update --override-input calc_module path:../logos-calc-module\ngit add flake.lock\n```\n\nAfter that, plain `nix run .` uses the locked local path \u2014 no override needed on each command:\n\n```bash\nnix run .\n```\n\nRe-run the `nix flake update --override-input \u2026` line whenever you want to re-point or refresh the lock. Switch to a `github:` URL in `flake.nix` when you're ready to pin to a published version.", "execs": []}, {"md": "### 6.4 Option C: Pin to the remote repo\n\nOnce `calc_module` is published to its own repo (with the `.so`/`.dylib` committed in `lib/`), point the input at it with a `github:` URL instead of the local `path:` \u2014 e.g. `calc_module.url = \"github:your-org/your-calc-module\";`. Then a plain `nix run .` fetches and builds `calc_module` from the remote:\n\n```bash\nnix run .\n```\n\n> **Important:** The remote repo must contain the built `.so`/`.dylib` in `lib/` (or the nix build must produce it). If the shared library is missing, the `calc_module` build will fail with linker errors.\n\nWhichever option you choose, clicking **Add**, **Multiply**, **Factorial**, or **Fibonacci** now calls the real module.", "execs": []}, {"md": "## Step 7: Using the Logos Design System\n\n`logos-basecamp` (and `logos-standalone-app`) has `logos-design-system` on its QML import path. Use its themed components directly \u2014 no extra setup in your module.\n\n```qml\nimport Logos.Theme\nimport Logos.Controls\nimport Logos.Icons        // optional: shared icon assets (LogosIcons.search, .install, .refresh, \u2026)\n```\n\n### Why use it\n\nHardcoding colors, font sizes, or rolling your own button means your module looks subtly different from every other module in basecamp, drifts as the design evolves, and re-implements work the design system already does. Using `Logos.Controls` + `Theme` tokens means your module gets the polished look automatically as the design system is updated \u2014 no churn on your side.\n\n### What's available\n\nRun the storybook to browse every component interactively with live property editors:\n\n```bash\ncd repos/logos-design-system\nnix run                  # or: ws run logos-design-system\n```\n\nThe sidebar splits components into two sections:\n\n- **Controls** \u2014 *designed per Figma, production-ready*. Use these directly. Examples: `LogosButton`, `LogosBadge`, `LogosCheckbox`, `LogosComboBox`, `LogosIconButton`, `LogosPaginator`, `LogosSearchBar`, `LogosTabBar` / `LogosTabButton`, `LogosTable` / `LogosTableColumn`, `LogosText`, `LogosTextField`, `LogosToolTip`.\n- **Controls (not designed)** \u2014 *placeholders with stable APIs but unstyled visuals*. Functional, you can ship with them, and you'll inherit the polished look automatically when each gets its design pass \u2014 no QML changes on your side. Examples: `LogosDialog`, `LogosDrawer`, `LogosFrame`, `LogosGroupBox`, `LogosItemDelegate`, `LogosMenu`, `LogosProgressBar`, `LogosRadioButton`, `LogosScrollBar` / `LogosScrollView`, `LogosSlider`, `LogosSpinBox`, `LogosSpinner`, `LogosStackView`, `LogosSwitch`, `LogosTextArea`, `LogosToolBar`.\n\nEach storybook page exposes a `designed: true/false` flag if you want to see at a glance which it is.\n\n### Replace raw Qt controls with Logos equivalents\n\n```qml\n// Instead of Button:\nLogosButton {\n    text: qsTr(\"Add\")\n    onClicked: callTwoOp(\"add\", inputA.text, inputB.text)\n}\n\n// Instead of TextField:\nLogosTextField {\n    id: inputA\n    placeholderText: qsTr(\"a\")\n}\n\n// Use theme colors instead of hardcoded hex values:\nRectangle {\n    color: Theme.palette.backgroundSecondary\n    Text { color: Theme.palette.text }\n}\n```\n\n### Theme tokens \u2014 avoid hardcoding magic numbers\n\n```qml\n// Palette  \u2014 Theme.palette.*\n//   background, backgroundSecondary, backgroundMuted, surface,\n//   text, textSecondary, textMuted, textTertiary,\n//   border, borderSubtle, primary, success, warning, error, info, hover, pressed, \u2026\n\n// Spacing  \u2014 Theme.spacing.*\n//   tiny, small, medium, large, xlarge, xxlarge,\n//   radiusSmall, radiusMedium, radiusLarge\n\n// Typography  \u2014 Theme.typography.*\n//   pageTitleText (36), titleText (30), panelTitleText (24),\n//   subtitleText (16), primaryText (14), secondaryText (12),\n//   weightRegular (400), weightMedium (500), weightBold (700),\n//   publicSans (font family)\n\n// Icons  \u2014 Logos.Icons.LogosIcons.*\n//   arrowLeft, arrowRight, refresh, install, trash, more, search, \u2026\n```\n\nIf a token you need is missing, file a feature issue \u2014 don't inline a hex literal or a magic number; that just stores up drift.\n\n### Feedback and contributions\n\nFeel free to report bugs, file feature requests, or contribute components / theme tokens upstream \u2014 all welcome at `logos-co/logos-design-system`. The same fix lifts every consumer, so upstreaming is the most impactful path. If you can sketch the public API you'd like to use in a feature request, it makes review and implementation much faster.", "execs": []}, {"md": "## Step 8: Load in `logos-basecamp`", "execs": []}, {"md": "### 8.1 Bundle as LGX packages\n\nCreate `.lgx` packages for both dev and portable variants. Use `--out-link` to avoid overwriting the `result` symlink:\n\n```bash\n# Package calc_module (from Part 1)\ncd ../logos-calc-module\nnix build '.#lgx' --out-link result-lgx\nnix build '.#lgx-portable' --out-link result-lgx-portable\n\n# Package the QML UI plugin\ncd ../logos-calc-ui\nnix build '.#lgx' --out-link result-lgx\nnix build '.#lgx-portable' --out-link result-lgx-portable\n```\n\n> For more bundling options (standalone bundler syntax, cross-platform packaging), see the [Developer Guide \u2014 Bundling with nix-bundle-lgx](logos-developer-guide.md#32-bundling-with-nix-bundle-lgx).\n\n```bash\nnix build '.#lgx' --out-link result-lgx\nnix build '.#lgx-portable' --out-link result-lgx-portable\n```\n\n> **Re-locking note:** earlier steps rebuilt `calc_module` and dropped `result-lgx` links inside its directory, so its on-disk contents changed since you first locked it. Because `calc_module` is a local `path:` input, re-run `nix flake update --override-input calc_module path:../logos-calc-module` before building so the lock matches the current contents (a stricter Nix otherwise rejects the stale hash).", "execs": [{"kind": "run", "cmd": "cd ../logos-calc-module && nix build '.#lgx' --out-link result-lgx && nix build '.#lgx-portable' --out-link result-lgx-portable && cd ../logos-calc-ui", "status": "pass", "exit_code": 0, "output": "warning: Git tree '/tmp/tutor x build 'github:logos-co/logos-basecamp' -o basecamp-result\n```\n\n```bash\n# Launch once to preinstall bundled modules, then close it\n./basecamp-result/bin/logos-basecamp\n```\n\nBasecamp creates its data directory on first launch. To find where it is, check the log output for `plugins directory` or look for the directory that contains `modules/` and `plugins/` subdirectories:\n\n```bash\n# macOS (typical path, may vary):\nls ~/Library/Application\\ Support/Logos/\n\n# Linux (typical path, may vary):\nls ~/.local/share/Logos/\n```\n\nThe dev build directory is named `LogosBasecampDev` (portable builds use `LogosBasecamp`).", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-basecamp' -o basecamp-result", "status": "pass", "exit_code": 0, "output": "unpacking 'github:logos-co/logos-basecamp/4018b591b686c580a78303ec84c3f150ca902a46' into the Git cache...\nunpacking 'github:logos-co/logos-liblogos/6b7e66da80679973ef3545bfe111f0541a00df1f?narHash=sha256-JxQneZlXsNpCQciCsH0hkZnCs3ZKLEeq91TBgorBt68%3D' into the Git cache...\nevaluation warning: `mesa.drivers` is deprecated, use `mesa` instead\nunpacking 'github:logos-co/logos-package-manager-module/420cca2bdca85935236436e2982683518c6b6b10?narHash=sha256-6DNnbKsPzlYaFHdhkD15Y36Qm8i9zT5YmOG24ko%2BNnU%3D' into the Git cache...\nunpacking 'github:logos-co/logos-module-builder/d71001c1fa2a3a25683ea5b79b22dd5c94b2892f?narHash=sha256-Ap6ldhSfSXTaE5GlRf%2Bsq0BGGvttW586pKbdmIIWb54%3D' into the Git cache...\nunpacking 'github:logos-co/logos-package-downloader-module/5d4bc2a1cd2628329c2227cf2731066fc67396d0?narHash=sha256-oMPDgMTzpARzS2AtO2/xxBsHjLjNc2V8vhzRkdlgjKQ%3D' into the Git cache...\nunpacking 'github:logos-co/logos-package-downloader/dea650359507d72007d16aaca5b3eb49d412b60e?narHash=sha256-f4a6bxObe/F363I2/5mt5iD%2BHRrMBFwGV0kj22/C%2BH4%3D' into the Git cache...\nunpacking 'github:logos-co/logos-nix/e637a1f5e871244d1c2df1e3c52a067f2eb406f2?narHash=sha256-3AN7aFnArdysrbQQ2UskWzjNSFADb4hDCsnx69Fa0ng%3D' int achix.org'...\ncopying path '/nix/store/6vlalv3620x0rq1ahj1rn44nfa1jylpz-logos-liblogos-bin-0.1.0' from 'https://logos-co.cachix.org'...\ncopying path '/nix/store/90xva89s7bhsi0w6l1p1l44xvpwxz53h-logos-liblogos' from 'https://logos-co.cachix.org'...\ncopying path '/nix/store/24kcrv8kdypd8pjilnjsnlj9appyrcvl-logos-basecamp-0.0.0-dev' from 'https://logos-co.cachix.org'...\n", "note": ""}]}, {"md": "### 8.3 Install modules with lgpm\n\nInstall your modules using `lgpm`. First, set `BASECAMP_DIR` to your platform's path:\n\n```bash\n# macOS:\nBASECAMP_DIR=\"$HOME/Library/Application Support/Logos/LogosBasecampDev\"\n\n# Linux:\nBASECAMP_DIR=\"$HOME/.local/share/Logos/LogosBasecampDev\"\n```\n\n```bash\nnix build 'github:logos-co/logos-package-manager#cli' --out-link ./pm\n```\n\n```bash\n# Install core module\n./pm/bin/lgpm --modules-dir \"$BASECAMP_DIR/modules\" \\\n  install --file ../logos-calc-module/result-lgx/*.lgx\n\n# Install UI plugin\n./pm/bin/lgpm --ui-plugins-dir \"$BASECAMP_DIR/plugins\" \\\n  install --file result-lgx/*.lgx\n\n# Launch basecamp -- your modules appear alongside the built-in ones\n./basecamp-result/bin/logos-basecamp\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-package-manager#cli' --out-link ./pm", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 8.4 Portable basecamp build (optional)\n\nThe dev build above depends on nix store paths at runtime. For a self-contained portable build that works without nix:\n\n```bash\nnix build 'github:logos-co/logos-basecamp#bin-bundle-dir' -o basecamp-portable\n```\n\n```bash\n# Launch once to preinstall bundled modules\n./basecamp-portable/bin/logos-basecamp\n```\n\nThe portable build uses a different data directory (`LogosBasecamp` instead of `LogosBasecampDev`). Set `BASECAMP_DIR` to your platform's path:\n\n```bash\n# macOS:\nBASECAMP_DIR=\"$HOME/Library/Application Support/Logos/LogosBasecamp\"\n\n# Linux:\nBASECAMP_DIR=\"$HOME/.local/share/Logos/LogosBasecamp\"\n```\n\nInstall your modules using the **portable** `.lgx` variants:\n\n```bash\n# Install core module (use portable variant)\n./pm/bin/lgpm --modules-dir \"$BASECAMP_DIR/modules\" \\\n  install --file ../logos-calc-module/result-lgx-portable/*.lgx\n\n# Install UI plugin (use portable variant)\n./pm/bin/lgpm --ui-plugins-dir \"$BASECAMP_DIR/plugins\" \\\n  install --file result-lgx-portable/*.lgx\n\n# Launch\n./basecamp-portable/bin/logos-basecamp\n```\n\n> **Important:** Portable basecamp requires portable `.lgx` variants (`result-lgx-portable`), and the dev build requires dev variants (`result-lgx`). Mixing them will cause loading failures.", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-basecamp#bin-bundle-dir' -o basecamp-portable", "status": "pass", "exit_code": 0, "output": "evaluation warning: `mesa.drivers` is deprecated, use `mesa` instead\nthis path will be fetched (276.1 MiB download, 746.6 MiB unpacked):\n  /nix/store/qg58mlivyzah27jjqgnmpxm24vkswapa-logos-basecamp-bundle-0.0.0-dev\ncopying path '/nix/store/qg58mlivyzah27jjqgnmpxm24vkswapa-logos-basecamp-bundle-0.0.0-dev' from 'https://logos-co.cachix.org'...\n", "note": ""}]}, {"md": "### 8.5 Install via logos-basecamp UI\n\nInstead of using `lgpm` on the command line, you can install modules through the basecamp UI:\n\n1. Launch `logos-basecamp`\n2. Go to **Package Manager**\n3. Click **Install from file**\n4. Select `../logos-calc-module/result-lgx/*.lgx` \u2014 installs `calc_module`\n5. Repeat for `result-lgx/*.lgx` \u2014 installs `calc_ui`\n\nThe \"Calculator UI\" tab appears in the sidebar. Clicking it loads your `Main.qml`.", "execs": []}, {"md": "### 8.6 Live reloading with `logos-standalone-app`\n\nFor QML iteration, set `DEV_QML_PATH` to the directory that contains your view entry file (the basename from `metadata.json` `view` must exist under that directory). For this tutorial's layout (`view`: `Main.qml` at repo root):\n\n```bash\nDEV_QML_PATH=$PWD nix run .\n```\n\nWhen `DEV_QML_PATH` is set, `logos-standalone-app` loads QML from your source tree at runtime instead of the installed copy \u2014 so edits in `Main.qml` are picked up on the next relaunch without you having to manually re-sync files.\n\n**Important \u2014 what this does *not* skip.** `nix run` always re-evaluates the flake and rehashes the source tree before launching. By default `src = ./.` includes every tracked file, including `*.qml` \u2014 so:\n\n- **Any source change, including QML edits, rebuilds the plugin** before the app starts. `DEV_QML_PATH` only kicks in *after* the build is done; it doesn't shortcut the rebuild itself.\n- **C++ / `.rep` / `metadata.json` / CMake changes** rebuild as normal.\n- The flake-evaluation overhead on each `nix run` is fixed and unavoidable while invoking through nix.\n\nFor the absolute fastest loop (no nix involvement after the first build), do the build once and run the resulting binary directly:\n\n```bash\n# Build once \u2014 populates result/ in the nix store\nnix build .\n\n# Subsequent runs: invoke the bundled standalone wrapper directly,\n# skipping nix entirely. DEV_QML_PATH still redirects QML loading.\nDEV_QML_PATH=$PWD ./result/bin/run-logos-standalone-ui\n```\n\n(Adjust the binary name to whatever `ls result/bin/` shows on your build.)\n\n> **Naming:** Only `DEV_QML_PATH` is honored. See `repos/logos-standalone-app/README.md`.\n\n> This does not work with `logos-basecamp`. Basecamp loads QML plugins from its own data directory, so changes to your source files are not reflected until you rebuild and reinstall the `.lgx` package.", "execs": []}, {"md": "### 8.7 Testing without any runtime\n\nYou can open `Main.qml` in any QML viewer (e.g., `qml` from Qt) to test the layout.\n\n#### Install\n\nYou'll need to have QML and any included modules (`QtQuick` and submodules `Controls`, and `Layout`).\n\nEg, to simply install on linux (apt package manager):\n\n```bash\nsudo apt install qml-qt6 qml6-module-qtquick qml6-module-qtquick-controls qml6-module-qtquick-layouts\n```\n\n#### Viewing the QML\n\nThe `logos` bridge won't be available, so clicking buttons will show \"Logos bridge not available\" -- but you can verify the layout and styling work correctly.\n\n```bash\n# If you have Qt and included modules installed\n# macOS:\nqml Main.qml\n\n# Linux:\nqml6 Main.qml\n```", "execs": []}, {"md": "## Step 9: UI Integration Tests\n\nYou can add automated UI tests that verify your QML plugin renders correctly. The test infrastructure is built into `logos-module-builder` \u2014 just add `.mjs` test files to a `tests/` directory and you get `nix build .#integration-test` for free.\n\nTests use the [logos-qt-mcp](https://github.com/logos-co/logos-qt-mcp) test framework, which connects to the QML inspector inside `logos-standalone-app` and can find elements, click buttons, verify text, and take screenshots.", "execs": []}, {"md": "### 9.1 Create a test file\n\nCreate `tests/ui-tests.mjs`:\n\n```javascript\nimport { resolve } from \"node:path\";\n\n// CI sets LOGOS_QT_MCP automatically; for interactive use: nix build .#test-framework -o result-mcp\nconst root =\n  process.env.LOGOS_QT_MCP ||\n  new URL(\"../result-mcp\", import.meta.url).pathname;\nconst { test, run } = await import(\n  resolve(root, \"test-framework/framework.mjs\")\n);\n\ntest(\"calc_ui: loads and shows title\", async (app) => {\n  await app.waitFor(\n    async () => {\n      await app.expectTexts([\"Logos Calculator\"]);\n    },\n    { timeout: 15000, interval: 500, description: \"calc_ui to load\" },\n  );\n});\n\ntest(\"calc_ui: add button visible\", async (app) => {\n  await app.expectTexts([\"Add\"]);\n});\n\ntest(\"calc_ui: click add shows validation\", async (app) => {\n  await app.click(\"Add\");\n  await app.waitFor(\n    async () => {\n      await app.expectTexts([\"Enter values for a and b\"]);\n    },\n    { timeout: 5000, interval: 500, description: \"validation message to appear\" },\n  );\n});\n\nrun();\n```", "execs": [{"kind": "file", "cmd": "write tests/ui-tests.mjs", "status": "pass", "note": "Wrote tests/ui-tests.mjs"}]}, {"md": "### 9.2 Run the tests\n\n```bash\ngit add tests/\n```", "execs": [{"kind": "run", "cmd": "git add tests/", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nnix build .#integration-test -L\n```\n\nThe `integration-test` output launches `logos-standalone-app` with `QT_QPA_PLATFORM=offscreen` (no display needed), connects to the QML inspector, and runs all `.mjs` files in `tests/`.\n\nYou can have multiple test files (e.g., `tests/smoke.mjs`, `tests/interactions.mjs`) \u2014 they are all discovered and run automatically.\n\nTo run tests interactively (against an already-running app):\n\n```bash\nnix build .#test-framework -o result-mcp\nnix run .          # start the app with inspector on :3768\nnode tests/ui-tests.mjs  # in another terminal\n```", "execs": [{"kind": "run", "cmd": "nix flake update --override-input calc_module path:../logos-calc-module && nix build .#integration-test -L", "status": "pass", "exit_code": 0, "output": "warning: Git tree '/tmp/tutorial-chain-foivub3s/logos-calc-ui' has uncommitted changes\nwarning: Git tree '/tmp/tutorial-chain-foivub3s/logos-calc-ui' has uncommitted changes\nevaluation warning: `mesa.drivers` is deprecated, use `mesa` instead\nthese 6 derivations will be built:\n  /nix/store/p8magy4pakk7dch13a5m9mkxd0gmslgm-logos-calc_module-module-lib-1.0.0.drv\n  /nix/store/x4v5yq4bf6xa0m3rgx105989rnjn8yxx-logos-calc_module-module-lib-lgx-1.0.0.drv\n  /nix/store/j41lxihx5825i839jgxcv3qd6shkvxhg-calc_ui-integration-test-modules.drv\n  /nix/store/skq3k2fwd482z6l5xvix312j8hf0kdsn-logos-calc_ui-module.drv\n  /nix/store/yzqzvfkb38fgm4im95aq40pv2c4mm35i-run-standalone.drv\n  /nix/store/ng42ab35id6njv1d0vnvz4a4vyp99kci-calc_ui-integration-test.drv\nthis path will be fetched (13.1 MiB download, 66.3 MiB unpacked):\n  /nix/store/a99hiwhamgzds70gxkfnb4cm8i926356-nodejs-22.19.0-d \"\ncalc_ui-integration-test>   \u2713 calc_ui: loads and shows title\ncalc_ui-integration-test>   \u2713 calc_ui: add button visible\ncalc_ui-integration-test>   \u2713 calc_ui: click add shows validation\ncalc_ui-integration-test> \ncalc_ui-integration-test> 3 passed, 0 failed\ncalc_ui-integration-test> \ncalc_ui-integration-test> [app:err] [QmlInspector] Client disconnected\ncalc_ui-integration-test> All integration tests passed\n", "note": ""}]}, {"md": "## Known Limitations\n\n### QML-to-C++ type coercion\n\nWhen calling C++ module methods from QML via `logos.callModule()`, arguments are passed through IPC as `QVariant` values. The runtime automatically coerces mismatched types to match the target method signature \u2014 for example, a `double` sent from QML will be converted to `int` if the method expects `int`, and numeric strings will be converted to their numeric types.\n\nThis means you can define methods with their natural parameter types (`int`, `bool`, `double`, etc.) and calls from QML will work without manual conversion:\n\n```cpp\n// This works \u2014 the runtime coerces arguments automatically\nQ_INVOKABLE int add(int a, int b) { return a + b; }\n```\n\n> **Note:** Type coercion uses `QVariant::convert()`, which rounds (not truncates) when converting `double` to `int` \u2014 e.g., `3.7` becomes `4`.\n\n### QML changes not appearing after rebuild\n\nQt caches compiled QML on disk. If you update your `Main.qml`, rebuild and reinstall the `.lgx`, but the old UI still appears, the cache is stale. Fix by disabling the cache before launching:\n\n```bash\nQML_DISABLE_DISK_CACHE=1 ./basecamp-result/bin/logos-basecamp\n```\n\n### UI module not loading or basecamp behaving unexpectedly\n\nWhen switching between portable and dev builds of basecamp, or running multiple basecamp instances, the data directory can get into a bad state (stale modules, mixed variants, corrupted preinstall). Clear it and let basecamp re-preinstall on next launch:\n\n```bash\n# Remove basecamp's data directory\n# macOS:\nrm -rf ~/Library/Application\\ Support/Logos/LogosBasecampDev\n\n# Linux:\nrm -rf ~/.local/share/Logos/LogosBasecampDev\n\n# Relaunch \u2014 basecamp will re-preinstall its bundled modules\n./basecamp-result/bin/logos-basecamp\n```\n\nThen reinstall your custom modules.", "execs": []}, {"md": "## Recap\n\n|                     | Core Module (Part 1)                            | QML UI Plugin (Part 2)        |\n| ------------------- | ----------------------------------------------- | ----------------------------- |\n| Language            | C++                                             | QML / JavaScript              |\n| Files               | `.cpp`, `.h`, `CMakeLists.txt`, `metadata.json` | `Main.qml`, `metadata.json`   |\n| Compilation         | Yes (CMake \u2192 `.so`)                             | No (file copy)                |\n| `metadata.type`     | `\"core\"`                                        | `\"ui_qml\"`                    |\n| Test command        | `logoscore -m ./result/lib -l calc_module`      | `nix run .`                   |\n| Calls other modules | Via `LogosAPI*` (C++)                           | Via `logos.callModule()` (JS) |", "execs": []}, {"md": "## What's Next\n\n- **Add more methods** to `calc_module` and call them from QML\n- **Use Logos Design System** styled components for consistent look and feel\n- **Build a C++ UI module** for cases where QML sandboxing is too restrictive \u2014 see [Developer Guide](logos-developer-guide.md), Section 7.2", "execs": []}]}, {"meta": {"name": "Tutorial Part 3: Building a C++ UI Module (Process-Isolated)", "platform": "Linux (ext=so)", "release": "(none)"}, "rows": [{"md": "# Tutorial Part 3: Building a C++ UI Module (Process-Isolated)\n\nThis is Part 3 of the Logos module tutorial series. In [Part 2](tutorial-qml-ui-app.md) you built a QML-only UI plugin. Now you'll build a **ui_qml module with a C++ backend** \u2014 the backend runs in a separate `ui-host` process while the QML view loads in the host app (basecamp / standalone).\n\n**What you'll build:** A `calc_ui_cpp` module with:\n\n- A `.rep` file defining the remote interface (slots)\n- A C++ backend plugin that inherits from the generated `SimpleSource` base class\n- A QML view that calls the backend via a typed replica using `logos.watch()`\n- Process isolation: backend crashes can't bring down the host app\n\n\n**Why C++ backend over QML-only?**\n\n|                   | QML-only (Part 2)                                                 | C++ backend (Part 3)                    |\n| ----------------- | ----------------------------------------------------------------- | --------------------------------------- |\n| Compilation       | None                                                              | CMake + Qt                              |\n| Process isolation | No (QML runs in-process)                                          | Yes (C++ in separate `ui-host` process) |\n| Backend calls     | `logos.callModule()` / `logos.callModuleAsync()` to other modules | `LogosModules` typed SDK in C++         |\n| Type safety       | Args travel as `QVariant`                                         | C++ types preserved                     |\n| QML \u2194 backend     | Direct bridge                                                     | Qt Remote Objects (typed replica)       |\n| `.rep` file       | Not needed                                                        | Required \u2014 defines the remote interface |\n\n## Prerequisites\n\n- Completed [Part 1](tutorial-wrapping-c-library.md) \u2014 you have a working `calc_module` with the shared library built (`.so` on Linux, `.dylib` on macOS in `logos-calc-module/lib/`)\n- Nix with flakes enabled", "execs": []}, {"md": "## Architecture\n\n```\n  logos-basecamp / logos-standalone-app\n  \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n  \u2502                                             \u2502\n  \u2502   QML View (Main.qml)                      \u2502\n  \u2502     readonly property var backend:          \u2502\n  \u2502       logos.module(\"calc_ui_cpp\")           \u2502\n  \u2502     logos.watch(backend.add(1,2))\u2502\n  \u2502          \u2502                                  \u2502\n  \u2502          \u2502  Qt Remote Objects (socket)      \u2502\n  \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u253c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n             \u2502\n  ui-host process (separate)\n  \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u253c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n  \u2502          \u25bc                                  \u2502\n  \u2502   CalcUiCppPlugin (backend)                 \u2502\n  \u2502     : CalcUiCppSimpleSource                 \u2502\n  \u2502     : CalcUiCppViewPluginBase               \u2502\n  \u2502     int add(int a, int b) {                 \u2502\n  \u2502       return m_logos->calc_module.add(a,b); \u2502\n  \u2502     }                                       \u2502\n  \u2502          \u2502                                  \u2502\n  \u2502          \u2502  LogosModules typed SDK           \u2502\n  \u2502          \u25bc                                  \u2502\n  \u2502   calc_module (loaded in ui-host)           \u2502\n  \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\nThe `.rep` file declares the interface. At build time, Qt's `repc` compiler generates:\n\n- **`CalcUiCppSimpleSource`** \u2014 base class the backend inherits from\n- **`CalcUiCppReplica`** \u2014 typed replica the QML view uses\n- **`calc_ui_cpp_replica_factory`** \u2014 separate plugin that the host loads to create typed replicas", "execs": []}, {"md": "## Step 1: Scaffold\n\nCreate a new directory and initialise it from the C++ backend UI template:\n\n`mkdir logos-calc-ui-cpp && cd logos-calc-ui-cpp`", "execs": []}, {"md": "```bash\nnix flake init -t github:logos-co/logos-module-builder#ui-qml-backend\n```\n\nThis creates the template. We'll customize it for our calculator.", "execs": [{"kind": "run", "cmd": "nix flake init -t github:logos-co/logos-module-builder#ui-qml-backend", "status": "pass", "exit_code": 0, "output": "wrote: \"/tmp/tutorial-chain-foivub3s/logos-calc-ui-cpp/CMakeLists.txt\"\nwrote: \"/tmp/tutorial-chain-foivub3s/logos-calc-ui-cpp/flake.nix\"\nwrote: \"/tmp/tutorial-chain-foivub3s/logos-calc-ui-cpp/metadata.json\"\nwrote: \"/tmp/tutorial-chain-foivub3s/logos-calc-ui-cpp/src/qml/Main.qml\"\nwrote: \"/tmp/tutorial-chain-foivub3s/logos-calc-ui-cpp/src/qml\"\nwrote: \"/tmp/tutorial-chain-foivub3s/logos-calc-ui-cpp/src/ui_example.rep\"\nwrote: \"/tmp/tutorial-chain-foivub3s/logos-calc-ui-cpp/src/ui_example_interface.h\"\nwrote: \"/tmp/tutorial-chain-foivub3s/logos-calc-ui-cpp/src/ui_example_plugin.cpp\"\nwrote: \"/tmp/tutorial-chain-foivub3s/logos-calc-ui-cpp/src/ui_example_plugin.h\"\nwrote: \"/tmp/tutorial-chain-foivub3s/logos-calc-ui-cpp/src\"\n", "note": ""}]}, {"md": "```bash\ngit init && git add -A\n```", "execs": [{"kind": "run", "cmd": "git init && git add -A", "status": "pass", "exit_code": 0, "output": "hint: Using 'master' as the name for the initial branch. This
