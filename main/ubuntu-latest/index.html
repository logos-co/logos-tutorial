AboAK0BOkBrgA7QGqADtAboAO0BN/SiO/PatoIAAAAASUVORK5CYII=\" | base64 -d > icons/calc.png\n```\n\nKey fields:\n\n- `\"type\": \"ui_qml\"` \u2014 tells the builder this is a QML view module\n- `\"main\": \"calc_ui_cpp_plugin\"` \u2014 the backend Qt plugin library (without extension)\n- `\"view\": \"qml/Main.qml\"` \u2014 the QML entry point\n- `\"dependencies\": [\"calc_module\"]` \u2014 core modules the backend calls", "execs": [{"kind": "run", "cmd": "mkdir -p icons && echo 'iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAAmElEQVR4nO3QMREAIBDAsFeEN3ziCWRkoEP2XmedfX82OkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAO0BN/SiO/PatoIAAAAASUVORK5CYII=' | base64 -d > icons/calc.png", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 3: The `.rep` File\n\nCreate `src/calc_ui_cpp.rep`:", "execs": []}, {"md": "```rep\nclass CalcUiCpp\n{\n    SLOT(int add(int a, int b))\n    SLOT(int multiply(int a, int b))\n    SLOT(int factorial(int n))\n    SLOT(int fibonacci(int n))\n    SLOT(QString libVersion())\n}\n```\n\nThis is the **single source of truth** for the remote interface. `repc` generates:\n\n- `rep_calc_ui_cpp_source.h` \u2014 `CalcUiCppSimpleSource` with virtual slots the backend overrides\n- `rep_calc_ui_cpp_replica.h` \u2014 `CalcUiCppReplica` with typed methods\n\n**SLOT** return values are delivered as `QRemoteObjectPendingReply` \u2014 use `logos.watch()` in QML to get them as JS Promises. You can also declare **PROP** entries (e.g. `PROP(QString status READWRITE)`) which auto-sync from the backend to the QML replica.", "execs": [{"kind": "file", "cmd": "write src/calc_ui_cpp.rep", "status": "pass", "note": "Wrote src/calc_ui_cpp.rep"}]}, {"md": "## Step 4: Interface header\n\nThe scaffolded template creates a set of `ui_example` files (`src/ui_example.rep`, `src/ui_example_interface.h`, `src/ui_example_plugin.{h,cpp}`). We replace them with `calc_ui_cpp` equivalents, so remove the example sources first \u2014 leaving them around with mismatched class/IID names just invites build errors or plugin-load failures at runtime:", "execs": []}, {"md": "```bash\nrm -f src/ui_example.rep src/ui_example_interface.h src/ui_example_plugin.h src/ui_example_plugin.cpp\n```\n\nNow create `src/calc_ui_cpp_interface.h`:", "execs": [{"kind": "run", "cmd": "rm -f src/ui_example.rep src/ui_example_interface.h src/ui_example_plugin.h src/ui_example_plugin.cpp", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```cpp\n#ifndef CALC_UI_CPP_INTERFACE_H\n#define CALC_UI_CPP_INTERFACE_H\n\n#include <QObject>\n#include <QString>\n#include \"interface.h\"\n\nclass CalcUiCppInterface : public PluginInterface\n{\npublic:\n    virtual ~CalcUiCppInterface() = default;\n};\n\n#define CalcUiCppInterface_iid \"org.logos.CalcUiCppInterface\"\nQ_DECLARE_INTERFACE(CalcUiCppInterface, CalcUiCppInterface_iid)\n\n#endif // CALC_UI_CPP_INTERFACE_H\n```\n\nYour plugin header should then include `calc_ui_cpp_interface.h` and use:\n\n- `Q_PLUGIN_METADATA(IID CalcUiCppInterface_iid FILE \"metadata.json\")`\n- `Q_INTERFACES(CalcUiCppInterface)`\n\nIf the interface filename or IID symbol doesn't match, you'll typically get build errors (missing header/symbol) or plugin-load failures at runtime.", "execs": [{"kind": "file", "cmd": "write src/calc_ui_cpp_interface.h", "status": "pass", "note": "Wrote src/calc_ui_cpp_interface.h"}]}, {"md": "## Step 5: `CMakeLists.txt`", "execs": []}, {"md": "```cmake\ncmake_minimum_required(VERSION 3.14)\nproject(CalcUiCppPlugin LANGUAGES CXX)\n\nif(DEFINED ENV{LOGOS_MODULE_BUILDER_ROOT})\n    include($ENV{LOGOS_MODULE_BUILDER_ROOT}/cmake/LogosModule.cmake)\nelse()\n    message(FATAL_ERROR \"LogosModule.cmake not found. Set LOGOS_MODULE_BUILDER_ROOT.\")\nendif()\n\nlogos_module(\n    NAME calc_ui_cpp\n    REP_FILE src/calc_ui_cpp.rep\n    SOURCES\n        src/calc_ui_cpp_interface.h\n        src/calc_ui_cpp_plugin.h\n        src/calc_ui_cpp_plugin.cpp\n)\n```\n\n`REP_FILE` tells `logos_module()` to:\n\n1. Run `repc` to generate source/replica headers\n2. Generate `CalcUiCppViewPluginBase` (typed remoting base class)\n3. Build a separate `calc_ui_cpp_replica_factory` shared library", "execs": [{"kind": "file", "cmd": "write CMakeLists.txt", "status": "pass", "note": "Wrote CMakeLists.txt"}]}, {"md": "## Step 6: C++ Backend Plugin", "execs": []}, {"md": "### 6.1 `src/calc_ui_cpp_plugin.h`\n\n```cpp\n#ifndef CALC_UI_CPP_PLUGIN_H\n#define CALC_UI_CPP_PLUGIN_H\n\n#include <QString>\n#include <QVariantList>\n#include \"calc_ui_cpp_interface.h\"\n#include \"LogosViewPluginBase.h\"\n#include \"rep_calc_ui_cpp_source.h\"\n\nclass LogosAPI;\nclass LogosModules;\n\n// Inherits CalcUiCppSimpleSource (generated from calc_ui_cpp.rep) so\n// enableRemoting() can publish the typed source and QML replicas get\n// auto-synced properties + callable slots.\nclass CalcUiCppPlugin : public CalcUiCppSimpleSource,\n                        public CalcUiCppInterface,\n                        public CalcUiCppViewPluginBase\n{\n    Q_OBJECT\n    Q_PLUGIN_METADATA(IID CalcUiCppInterface_iid FILE \"metadata.json\")\n    Q_INTERFACES(CalcUiCppInterface)\n\npublic:\n    explicit CalcUiCppPlugin(QObject* parent = nullptr);\n    ~CalcUiCppPlugin() override;\n\n    QString name()    const override { return \"calc_ui_cpp\"; }\n    QString version() const override { return \"1.0.0\"; }\n\n    Q_INVOKABLE void initLogos(LogosAPI* api);\n\n    // Slots from calc_ui_cpp.rep \u2014 return values directly. The QML replica\n    // receives QRemoteObjectPendingReply; use logos.watch() in QML to get the value.\n    int add(int a, int b) override;\n    int multiply(int a, int b) override;\n    int factorial(int n) override;\n    int fibonacci(int n) override;\n    QString libVersion() override;\n\nsignals:\n    void eventResponse(const QString& eventName, const QVariantList& args);\n\nprivate:\n    LogosAPI* m_logosAPI = nullptr;\n    LogosModules* m_logos = nullptr;\n};\n\n#endif // CALC_UI_CPP_PLUGIN_H\n```\n\nThree base classes:\n\n- **`CalcUiCppSimpleSource`** \u2014 generated from `.rep`, provides the typed source for Qt Remote Objects\n- **`CalcUiCppInterface`** \u2014 standard Logos plugin interface (`name()`, `version()`)\n- **`CalcUiCppViewPluginBase`** \u2014 generated, provides `setBackend()` and `enableRemoting()`", "execs": [{"kind": "file", "cmd": "write src/calc_ui_cpp_plugin.h", "status": "pass", "note": "Wrote src/calc_ui_cpp_plugin.h"}]}, {"md": "### 6.2 `src/calc_ui_cpp_plugin.cpp`\n\n```cpp\n#include \"calc_ui_cpp_plugin.h\"\n#include \"logos_api.h\"\n#include \"logos_sdk.h\"\n\nCalcUiCppPlugin::CalcUiCppPlugin(QObject* parent) : CalcUiCppSimpleSource(parent) {}\nCalcUiCppPlugin::~CalcUiCppPlugin() { delete m_logos; }\n\nvoid CalcUiCppPlugin::initLogos(LogosAPI* api)\n{\n    if (m_logos) return;\n    m_logosAPI = api;\n    m_logos = new LogosModules(api);\n    // Register this object as the Remote Objects source so the QML replica\n    // can see its properties and call its slots.\n    setBackend(this);\n}\n\nint CalcUiCppPlugin::add(int a, int b)\n{\n    return m_logos->calc_module.add(a, b);\n}\n\nint CalcUiCppPlugin::multiply(int a, int b)\n{\n    return m_logos->calc_module.multiply(a, b);\n}\n\nint CalcUiCppPlugin::factorial(int n)\n{\n    return m_logos->calc_module.factorial(n);\n}\n\nint CalcUiCppPlugin::fibonacci(int n)\n{\n    return m_logos->calc_module.fibonacci(n);\n}\n\nQString CalcUiCppPlugin::libVersion()\n{\n    return m_logos->calc_module.libVersion();\n}\n```\n\nKey points:\n\n- Constructor calls `CalcUiCppSimpleSource(parent)` \u2014 not `QObject(parent)`\n- `initLogos()` calls `setBackend(this)` to register with the Remote Objects host\n- Slots return values directly \u2014 they travel back to the QML replica via Qt Remote Objects\n- `m_logos->calc_module.add(a, b)` uses the generated typed SDK (type-safe, no QVariant)", "execs": [{"kind": "file", "cmd": "write src/calc_ui_cpp_plugin.cpp", "status": "pass", "note": "Wrote src/calc_ui_cpp_plugin.cpp"}]}, {"md": "## Step 7: QML View\n\nCreate `src/qml/Main.qml`:", "execs": []}, {"md": "```qml\nimport QtQuick\nimport QtQuick.Controls\nimport QtQuick.Layouts\n\nItem {\n    id: root\n\n    property string result: \"\"\n    property string errorText: \"\"\n\n    // Typed replica of the backend running in ui-host (generated from calc_ui_cpp.rep).\n    readonly property var backend: logos.module(\"calc_ui_cpp\")\n\n    // logos.watch() delivers the result of a replica slot call via callbacks.\n    // No QtRemoteObjects import needed \u2014 the bridge handles it.\n    function callCalc(method, args) {\n        if (!backend) {\n            root.errorText = \"Backend not available\"\n            return\n        }\n        root.errorText = \"\"\n        root.result = \"...\"\n        logos.watch(backend[method].apply(backend, args),\n            function(value) { root.result = String(value) },\n            function(error) { root.errorText = String(error) }\n        )\n    }\n\n    ColumnLayout {\n        anchors.fill: parent\n        anchors.margins: 24\n        spacing: 16\n\n        Text {\n            text: \"Logos Calculator (C++ backend)\"\n            font.pixelSize: 20\n            color: \"#ffffff\"\n            Layout.alignment: Qt.AlignHCenter\n        }\n\n        RowLayout {\n            spacing: 12\n            Layout.fillWidth: true\n\n            TextField {\n                id: inputA\n                placeholderText: \"a\"\n                Layout.preferredWidth: 80\n                validator: IntValidator {}\n            }\n\n            TextField {\n                id: inputB\n                placeholderText: \"b\"\n                Layout.preferredWidth: 80\n                validator: IntValidator {}\n            }\n\n            Button {\n                text: \"Add\"\n                onClicked: root.callCalc(\"add\", [parseInt(inputA.text) || 0, parseInt(inputB.text) || 0])\n            }\n\n            Button {\n                text: \"Multiply\"\n                onClicked: root.callCalc(\"multiply\", [parseInt(inputA.text) || 0, parseInt(inputB.text) || 0])\n            }\n        }\n\n        RowLayout {\n            spacing: 12\n            Layout.fillWidth: true\n\n            TextField {\n                id: inputN\n                placeholderText: \"n\"\n                Layout.preferredWidth: 80\n                validator: IntValidator { bottom: 0 }\n            }\n\n            Button {\n                text: \"Factorial\"\n                onClicked: root.callCalc(\"factorial\", [parseInt(inputN.text) || 0])\n            }\n\n            Button {\n                text: \"Fibonacci\"\n                onClicked: root.callCalc(\"fibonacci\", [parseInt(inputN.text) || 0])\n            }\n\n            Button {\n                text: \"libcalc version\"\n                onClicked: root.callCalc(\"libVersion\", [])\n            }\n        }\n\n        Rectangle {\n            Layout.fillWidth: true\n            height: 56\n            color: root.errorText.length > 0 ? \"#3d1a1a\" : \"#1a2d1a\"\n            radius: 8\n\n            Text {\n                anchors.centerIn: parent\n                text: root.errorText.length > 0 ? root.errorText\n                        : (root.result.length > 0 ? root.result : \"Enter values and press a button\")\n                color: root.errorText.length > 0 ? \"#f85149\" : \"#56d364\"\n                font.pixelSize: 15\n            }\n        }\n\n        Item { Layout.fillHeight: true }\n    }\n}\n```\n\nKey patterns:\n\n- `logos.module(\"calc_ui_cpp\")` \u2014 gets the typed replica (auto-synced properties)\n- `logos.watch(backend.add(1, 2), ...)` \u2014 SLOT return value as JS Promise\n- The `logos` object is injected by the host at runtime \u2014 no `QtRemoteObjects` import needed", "execs": [{"kind": "file", "cmd": "write src/qml/Main.qml", "status": "pass", "note": "Wrote src/qml/Main.qml"}]}, {"md": "## Step 8: Use the Logos Design System in your QML\n\nThe QML you load above runs inside the host (`logos-basecamp` / `logos-standalone-app`), which already has `logos-design-system` on the QML import path. Use its themed components rather than rolling your own visuals \u2014 your module gets the polished look automatically as the design system evolves.\n\n```qml\nimport Logos.Theme\nimport Logos.Controls\nimport Logos.Icons        // optional shared icon assets\n\nLogosButton {\n    text: qsTr(\"Add\")\n    onClicked: root.callCalc(\"add\", [parseInt(inputA.text) || 0,\n                                     parseInt(inputB.text) || 0])\n}\n\nLogosTextField {\n    id: inputA\n    placeholderText: qsTr(\"a\")\n}\n\nRectangle {\n    color: Theme.palette.backgroundSecondary\n    radius: Theme.spacing.radiusSmall\n    LogosText { text: qsTr(\"Result\"); color: Theme.palette.text }\n}\n```\n\n**Discover what's available** by running the storybook:\n\n```bash\ncd repos/logos-design-system && nix run\n```\n\nThe sidebar splits components into:\n\n- **Controls** \u2014 designed per Figma, production-ready (`LogosButton`, `LogosBadge`, `LogosCheckbox`, `LogosComboBox`, `LogosIconButton`, `LogosPaginator`, `LogosSearchBar`, `LogosTabBar`, `LogosTable`, `LogosText`, `LogosTextField`, `LogosToolTip`, \u2026).\n- **Controls (not designed)** \u2014 placeholders with stable APIs but unstyled visuals (`LogosDialog`, `LogosDrawer`, `LogosScrollView`, `LogosSpinner`, `LogosTextArea`, `LogosSwitch`, \u2026). You can ship with them; they'll get the polished look applied later without you having to change your QML.\n\n**Theme tokens** (use these instead of hex literals or magic font sizes):\n\n- `Theme.palette.*` \u2014 `background`, `backgroundSecondary`, `surface`, `text`, `textSecondary`, `border`, `primary`, `success`, `warning`, `error`, `info`, `hover`, `pressed`, \u2026\n- `Theme.spacing.*` \u2014 `tiny`, `small`, `medium`, `large`, `xlarge`, `xxlarge`, `radiusSmall`, `radiusMedium`, `radiusLarge`\n- `Theme.typography.*` \u2014 `pageTitleText` (36), `titleText` (30), `panelTitleText` (24), `subtitleText` (16), `primaryText` (14), `secondaryText` (12); `weightRegular` / `weightMedium` / `weightBold`; `publicSans`\n- `Logos.Icons.LogosIcons.*` \u2014 `arrowLeft`, `arrowRight`, `refresh`, `install`, `trash`, `more`, `search`, \u2026\n\n**Feedback and contributions**\n\nFeel free to report bugs, file feature requests, or contribute components / theme tokens upstream \u2014 all welcome at `logos-co/logos-design-system`. The same fix lifts every consumer, so upstreaming is the most impactful path. If you can sketch the public API you'd like to use in a feature request, it makes review and implementation much faster.", "execs": []}, {"md": "## Step 9: `flake.nix`\n\nThe template already wires everything up. Update the description and point `calc_module` at your dependency:", "execs": []}, {"md": "```nix\n{\n  description = \"Calculator C++ UI plugin for Logos - QML view with process-isolated backend for calc_module\";\n\n  inputs = {\n    logos-module-builder.url = \"github:logos-co/logos-module-builder\";\n\n    # Points at your local calc_module checkout. This is a placeholder \u2014\n    # you lock it to your actual path in the next step with\n    # `nix flake update --override-input` (see \"Lock and build\" below).\n    calc_module.url = \"path:/path/to/your/calc_module\";\n  };\n\n  outputs = inputs@{ logos-module-builder, calc_module, ... }:\n    logos-module-builder.lib.mkLogosQmlModule {\n      src = ./.;\n      configFile = ./metadata.json;\n      flakeInputs = inputs;\n    };\n}\n```\n\nThe `calc_module` input attribute name must match the dependency name in `metadata.json`.\n\nThe placeholder `path:/path/to/your/calc_module` is **not** meant to be edited by hand \u2014 Nix won't let a `flake.nix` input use a relative path like `../logos-calc-module` (it's evaluated from a sandboxed copy, so `..` escapes it). Instead you point it at your real checkout **once** via `--override-input` in the next step, which records the resolved absolute path in `flake.lock`. After that, plain `nix run` / `nix build` use the locked path with no override needed.\n\n- **`path:`** (used here) \u2014 a local directory on disk. Best for developing `calc_module` and its UI side by side, no network.\n- **`github:`** \u2014 fetches `calc_module` from a remote repo instead (for CI, or once it's published to its own repo), e.g. `calc_module.url = \"github:your-org/your-calc-module\";`.\n\n> **Important:** Whichever URL scheme you use, `calc_module` must be built with its shared library (`.so` on Linux, `.dylib` on macOS) present in `lib/`. If it's missing, the nix build will fail with linker errors. See [Part 1, Step 1.5](tutorial-wrapping-c-library.md#15-build-the-shared-library).\n\n`mkLogosQmlModule` handles everything: compiles the C++ backend (because `main` is set), bundles the QML view, generates LGX packages, and wires up `nix run`.", "execs": [{"kind": "file", "cmd": "write flake.nix", "status": "pass", "note": "Wrote flake.nix"}]}, {"md": "## Step 10: Build and Run\n\nFirst, make sure your local `calc_module` is built and its shared library is present in `lib/` (see [Part 1, Step 1.5](tutorial-wrapping-c-library.md#15-build-the-shared-library)):", "execs": []}, {"md": "### 10.1 Ensure `calc_module` is built\n\n```bash\nls ../logos-calc-module/lib/libcalc.so    # Linux\nls ../logos-calc-module/lib/libcalc.dylib  # macOS\n```\n\nIf the file is missing, build it first (as covered in [Part 1, Step 1.5](tutorial-wrapping-c-library.md#15-build-the-shared-library)):\n\n```bash\ncd ../logos-calc-module/lib\ngcc -shared -fPIC -o libcalc.so libcalc.c     # Linux\n# gcc -shared -fPIC -o libcalc.dylib libcalc.c  # macOS\ncd ../../logos-calc-ui-cpp\n```", "execs": [{"kind": "run", "cmd": "ls ../logos-calc-module/lib/libcalc.so", "status": "pass", "exit_code": 0, "output": "../logos-calc-module/lib/libcalc.so\n", "note": ""}, {"kind": "run", "cmd": "cd ../logos-calc-module/lib && gcc -shared -fPIC -o libcalc.so libcalc.c && cd ../../logos-calc-ui-cpp", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 10.2 Lock and build\n\nStage your files, then lock `calc_module` to your local Part 1 checkout. The `--override-input` resolves `../logos-calc-module` to an absolute path and records it in `flake.lock`, replacing the placeholder from `flake.nix`:\n\n```bash\ngit add -A\n```", "execs": [{"kind": "run", "cmd": "git add -A", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nnix flake update --override-input calc_module path:../logos-calc-module\n```", "execs": [{"kind": "run", "cmd": "nix flake update --override-input calc_module path:../logos-calc-module", "status": "pass", "exit_code": 0, "output": "warning: Git tree '/tmp/tutorial-chain-foivub3s/logos-calc-ui-cpp' has uncommitted changes\nwarning: creating lock file \"/tmp/tutorial-chain-foivub3s/logos-calc-ui-cpp/flake.lock\": \n\u2022 Added input 'calc_module':\n    'path:/tmp/tutorial-chain-foivub3s/logos-calc-module'\n\u2022 Added input 'calc_module/logos-module-builder':\n    'github:logos-co/logos-module-builder/131faf1' (2026-05-29)\n\u2022 Added input 'calc_module/logos-module-builder/logos-cpp-sdk':\n    'github:logos-co/logos-cpp-sdk/d77c3dd' (2026-05-25)\n\u2022 Added input 'calc_module/logos-module-builder/logos-cpp-sdk/logos-nix':\n    'github:logos-co/logos-nix/e637a1f' (2026-03-25)\n\u2022 Added input 'calc_module/logos-module-builder/logos-cpp-sdk/logos-nix/nixpkgs':\n    'github:NixOS/nixpkgs/e9f00bd' (2025-09-28)\n\u2022 Added input 'calc_module/logos-module-builder/logos-cpp-sdk/nixpkgs':\n    follows 'calc_module/logos-module-builder/logos-cpp-sdk/logos-nix/nixpkgs'\n\u2022 Added input 'calc_module/logos-module-builder/logos-module':\n    'github:logos-co/logos-module/1947784' (2026-04-16)\n\u2022 Adde lLoAAAWXSURBVAQAAAAEIgAAACAQAQAAAIEIAAAACEQAAABAIAIAAAACEQAAABCIAAAAgEAEAAAABCIAAAAgEAEAAACBCAAAAAhEAAAAQCACAAAAAhEAAAAQiAAAAIBABAAAAAQiAAAAIBABAAAAgQgAAAAIRAAAAEAgAgAAAAIRAAAAEIgAAACAQAQAAAAEIgAAACAQAQAAAIEIAAAACEQAAABAIAIAAAACEQAAABCIAAAAgEAEAAAABCIAAAAgEAEAAACBCAAAAAhEAAAAQCACAAAAAhEAAAAQiAAAAIBABAAAAAQiAAAAIBABAAAAgQgAAAAIRAAAAEAgAgAAAAIRAAAAEIgAAACAQAQAAAAEIgAAACAQAQAAAIEIAAAACEQAAABAIAIAAAACEQAAABCIAAAAgEAEAAAABCIAAAAgEAEAAACBCAAAAAhEAAAAQCACAAAAAhEAAAAQiAAAAIBABAAAAAQiAAAAIBABAAAAgQgAAAAIRAAAAEAgAgAAAAIRAAAAEIgAAACAQAQAAAAEIgAAACAQAQAAAIEIAAAACEQAAABAIAIAAAACEQAAABCIAAAAgEAEAAAABCIAAAAgEAEAAACBCAAAAAhEAAAAQCACAAAAAhEAAAAQiAAAAIBABAAAAAQiAAAAIBABAAAAgQgAAAAIRAAAAEAgAgAAAAIRAAAAEIgAAACAQAQAAAAEIgAAACAQAQAAAIEIAAAACEQAAABAIAIAAAACEQAAABCIAAAAgEAEAAAABCIAAAAgEAEAAACBCAAAAAhEAAAAQCACAAAAAhEAAAAQiAAAAIBABAAAAAQiAAAAIBABAAAAgQgAAAAIRAAAAEAgAgAAAAIRAAAAEIgAAACAQAQAAAAEIgAAACAQAQAAAIEIAAAACEQAAABAIAIAAAACEQAAABCIAAAAgEAEAAAABCIAAAAgEAEAAACBCAAAAAhEAAAAQCACAAAAAhEAAAAQiAAAAIBABAAAAAQiAAAAIBABAAAAgQgAAAAIRAAAAEAgAgAAAAIRAAAAEIgAAACAQAQAAAAEIgAAACAQAQAAAIEIAAAACEQAAABAIAIAAAACEQAAABCIAAAAgEAEAAAABCIAAAAgEAEAAACBCAAAAAhEAAAAQCACAAAAAhEAAAAQiAAAAIBABAAAAAQiAAAAIBABAAAAgQgAAAAIRAAAAEAgAgAAAAIRAAAAEIgAAACAQAQAAAAEIgAAACAQAQAAAIEIAAAACEQAAABAIAIAAAACEQAAABCIAAAAgEAEAAAABCIAAAAgEAEAAACBCAAAAAhEAAAAQCACAAAAAhEAAAAQiAAAAIBABAAAAAQiAAAAIBABAAAAgQgAAAAIRAAAAEAgAgAAAAIRAAAAEIgAAACAQAQAAAAEIgAAACAQAQAAAIEIAAAACEQAAABAIAIAAAACEQAAABCIAAAAgEAEAAAABCIAAAAgEAEAAACBCAAAAAhEAAAAQCACAAAAAhEAAAAQiAAAAIBABAAAAAQiAAAAIBABAAAAgQgAAAAIRAAAAEAgAgAAAAIRAAAAEIgAAACAQAQAAAAEIgAAACAQAQAAAIEIAAAACEQAAABAIAIAAAACEQAAABCIAAAAgEAEAAAABCIAAAAgEAEAAACBCAAAAAhEAAAAQCACAAAAAhEAAAAQiAAAAIBABAAAAAQiAAAAIBABAAAAgQgAAAAIRAAAAEAgAgAAAAIRAAAAEIgAAACAQAQAAAAEIgAAACAQAQAAAIEIAAAACEQAAABAIAIAAAACEQAAABCIAAAAgEAEAAAABCIAAAAgEAEAAACBCAAAAAhEAAAAQCACAAAAAhEAAAAQiAAAAIBABAAAAAQiAAAAIBABAAAAgQgAAAAIRAAAAEAgAgAAAAIRAAAAEIgAAACAQAQAAAAE8v8BgvJylV/ie+UAAAAASUVORK5CYII=)\n\nThe result `8` comes from `calc_module.add(3, 5)` executed in the C++ backend \u2014 proof the full path (QML replica \u2192 Qt Remote Objects \u2192 ui-host backend \u2192 typed SDK \u2192 `calc_module`) works end to end.", "execs": [{"kind": "ui_test", "cmd": "nix run .\n\n# test actions:\n- App window opens with title: wait for ['Logos Calculator (C++ backend)']\n- Operation buttons visible: wait for ['Add', 'Multiply', 'Factorial', 'Fibonacci']\n- Enter operands: set placeholderText='a' to '3'\n- Set second operand: set placeholderText='b' to '5'\n- Click Add: click 'Add'\n- Result of 3 + 5 shows 8: wait for ['8']", "status": "pass", "output": "\nRunning 1 test(s)...\n\n  \u001b[32m\u2713\u001b[0m Tutorial Part 3: Building a C++ UI Module (Process-Isolated): Launch and verify the UI\n\n1 passed, 0 failed\n\n", "note": ""}]}, {"md": "## Step 11: Live reloading QML with `DEV_QML_PATH`\n\nFor QML iteration, point `DEV_QML_PATH` at the directory that contains your view entry's **basename** (from `metadata.json` `\"view\"`). This tutorial sets `\"view\": \"qml/Main.qml\"`, so the directory must contain `Main.qml` (here: `src/qml/`):\n\n```bash\nDEV_QML_PATH=$PWD/src/qml nix run .\n```\n\nWhen `DEV_QML_PATH` is set, `logos-standalone-app` loads QML from your source tree at runtime instead of the installed copy \u2014 so edits to `Main.qml` (and any QML under that tree) are picked up on the next relaunch without you having to re-sync files.\n\n**Important \u2014 what this does *not* skip.** `nix run` always re-evaluates the flake and rehashes the source tree before launching. By default `src = ./.` includes every tracked file, including `*.qml` \u2014 so:\n\n- **Any source change, including QML edits, rebuilds the plugin** before the app starts. `DEV_QML_PATH` only kicks in *after* the build is done; it doesn't shortcut the rebuild itself.\n- **C++ / `.rep` / `metadata.json` / CMake changes** rebuild as normal.\n- The flake-evaluation overhead on each `nix run` is fixed and unavoidable while invoking through nix.\n\nFor the absolute fastest loop (no nix involvement after the first build), do the build once and run the resulting binary directly:\n\n```bash\n# Build once \u2014 populates result/ in the nix store\nnix build .\n\n# Subsequent runs: invoke the bundled standalone wrapper directly,\n# skipping nix entirely. DEV_QML_PATH still redirects QML loading.\nDEV_QML_PATH=$PWD/src/qml ./result/bin/run-logos-standalone-ui\n```\n\n(Adjust the binary name to whatever `ls result/bin/` shows on your build.)\n\n> **Naming:** Only `DEV_QML_PATH` is honored by `logos-standalone-app`. See `repos/logos-standalone-app/README.md`.\n\n> This does not work with `logos-basecamp` \u2014 Basecamp loads QML plugins from its own install tree, so source edits are not picked up until you rebuild and reinstall the `.lgx`.", "execs": []}, {"md": "## Step 12: How the Pieces Connect\n\n1. `nix build` \u2192 compiles the C++ plugin + replica factory, bundles QML view\n2. `nix run` \u2192 launches `logos-standalone-app` which:\n   - Loads `calc_module` (dependency)\n   - Spawns a `ui-host` child process with `calc_ui_cpp_plugin.so`\n   - `ui-host` calls `initLogos()` \u2192 `setBackend(this)` \u2192 `enableRemoting(host)`\n   - Backend is now accessible over a local socket\n3. Host app loads `calc_ui_cpp_replica_factory.dylib` \u2192 creates a typed replica\n4. QML gets the replica via `logos.module(\"calc_ui_cpp\")`\n5. `backend.add(1, 2)` \u2192 Qt Remote Objects sends call to ui-host \u2192 backend runs \u2192 returns result", "execs": []}, {"md": "## Step 13: UI Integration Tests\n\nAdd automated UI tests using the [logos-qt-mcp](https://github.com/logos-co/logos-qt-mcp) test framework. Just create `.mjs` files in `tests/` and `logos-module-builder` auto-wires `nix build .#integration-test`.\n\nTests connect to the QML inspector inside `logos-standalone-app` and can find elements, click buttons, verify text, and take screenshots.", "execs": []}, {"md": "### 13.1 Create a test file\n\nCreate `tests/ui-tests.mjs`:\n\n```javascript\nimport { resolve } from \"node:path\";\n\n// CI sets LOGOS_QT_MCP automatically; for interactive use: nix build .#test-framework -o result-mcp\nconst root =\n  process.env.LOGOS_QT_MCP ||\n  new URL(\"../result-mcp\", import.meta.url).pathname;\nconst { test, run } = await import(\n  resolve(root, \"test-framework/framework.mjs\")\n);\n\ntest(\"calc_ui_cpp: loads and shows title\", async (app) => {\n  await app.waitFor(\n    async () => {\n      await app.expectTexts([\"Logos Calculator (C++ backend)\"]);\n    },\n    { timeout: 15000, interval: 500, description: \"UI to load\" },\n  );\n});\n\ntest(\"calc_ui_cpp: operation buttons visible\", async (app) => {\n  await app.expectTexts([\"Add\", \"Multiply\", \"Factorial\", \"Fibonacci\"]);\n});\n\nrun();\n```", "execs": [{"kind": "file", "cmd": "write tests/ui-tests.mjs", "status": "pass", "note": "Wrote tests/ui-tests.mjs"}]}, {"md": "### 13.2 Run the tests\n\n```bash\ngit add tests/\n```", "execs": [{"kind": "run", "cmd": "git add tests/", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\n# Hermetic CI test\nnix build .#integration-test -L\n```\n\nThe `integration-test` output launches `logos-standalone-app` with `QT_QPA_PLATFORM=offscreen` (no display needed), connects to the QML inspector, and runs all `.mjs` files in `tests/`.\n\nTo run tests interactively (against an already-running app):\n\n```bash\nnix build .#test-framework -o result-mcp\nnix run .                     # app with inspector on :3768\nnode tests/ui-tests.mjs       # in another terminal\n```", "execs": [{"kind": "run", "cmd": "nix flake update --override-input calc_module path:../logos-calc-module && nix build .#integration-test -L", "status": "pass", "exit_code": 0, "output": "warning: Git tree '/tmp/tutorial-chain-foivub3s/logos-calc-ui-cpp' has uncommitted changes\nwarning: Git tree '/tmp/tutorial-chain-foivub3s/logos-calc-ui-cpp' has uncommitted changes\nevaluation warning: `mesa.dri <script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble"));

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  picker.addEventListener("change", () => render(+picker.value));
  render(0);
</script>
